---
- name: Host Setup
  hosts: local
  become: false
  gather_facts: true
  tags: [setup_host]
  roles:
    - role: setup_host
      tags: [setup_host, homebrew, dependencies, ssh, verify]

- name: kubernetes
  hosts: local
  become: false
  gather_facts: true
  tags: [kubespray, kubernetes]
  roles:
    - role: kubespray
      tags: [kubernetes, kubespray]

- name: Master Node Configuration
  hosts: masters
  become: true
  gather_facts: true
  tags: [master, deploy]
  roles:
    - role: server
      tags: [server]
    - role: docker
      tags: [docker]
    - role: apps
      tags: [apps]
    - role: pangolin
      tags: [pangolin]
      vars:
        pangolin_mode: node

- name: Worker Nodes Configuration
  hosts: workers
  become: true
  gather_facts: true
  tags: [worker, deploy]
  roles:
    - role: server
      tags: [server]
    - role: docker
      tags: [docker]
    - role: apps
      tags: [apps]
    - role: pangolin
      tags: [pangolin]
      vars:
        pangolin_mode: node

- name: Gateway Configuration
  hosts: gateway
  become: true
  gather_facts: true
  tags: [gateway, deploy]
  roles:
    - role: server
      tags: [server]
    - role: docker
      tags: [docker]
    - role: apps
      tags: [apps]
    - role: pangolin
      tags: [pangolin]
      vars:
        pangolin_mode: gateway

- name: Storage Nodes Configuration
  hosts: storages
  become: true
  gather_facts: true
  tags: [storage, storages, deploy]
  roles:
    - role: server
      tags: [server]
    - role: docker
      tags: [docker]
    - role: storage-node
      tags: [storage-node, openebs]
    - role: pangolin
      tags: [pangolin]
      vars:
        pangolin_mode: node

- name: Backup Node Configuration
  hosts: backups
  become: true
  gather_facts: true
  tags: [backup, backups, deploy]
  roles:
    - role: server
      tags: [server]
    - role: backup-node
      tags: [backup-node, nfs, restic]

- name: Deploy OpenEBS Storage
  hosts: local
  become: false
  gather_facts: true
  tags: [storage, openebs]
  roles:
    - role: storage
      tags: [storage, openebs]

- name: Deploy Infrastructure via Helmfile
  hosts: local
  become: false
  gather_facts: true
  tags: [infrastructure, helmfile]
  roles:
    - role: infrastructure
      tags: [infrastructure, base, databases, apps]

- name: Deploy Monitoring Stack
  hosts: local
  become: false
  gather_facts: true
  tags: [monitoring]
  roles:
    - role: monitoring
      tags: [monitoring, prometheus, grafana, loki]

- name: Deploy Backup Configuration
  hosts: local
  become: false
  gather_facts: true
  tags: [backup]
  roles:
    - role: backup
      tags: [backup, velero]

- name: Deploy Zerobyte Backups
  hosts: local
  become: false
  gather_facts: true
  tags: [zerobyte, backup]
  tasks:
    - name: Deploy Zerobyte via Helmfile
      command: helmfile -e k8s apply --selector name=zerobyte
      args:
        chdir: "{{ playbook_dir }}/../kubernetes"
      register: zerobyte_deploy
      changed_when: "'no changes' not in zerobyte_deploy.stdout"

- name: Validation and Verification
  hosts: local
  become: false
  gather_facts: true
  tags: [validate, verify]
  roles:
    - role: validate
      tags: [validate, verify, test]
