# Ansible Inventory File
# Copy this file to hosts.ini and fill in your actual host information
# hosts.ini is in .gitignore and will not be committed to git

[vps]
# VPS server for Pangolin server deployment
# Example:
# server ansible_host=192.168.1.99 ansible_user=root ansible_port=22

[local]
# 127.0.0.1 ansible_user=admin ansible_port=22 ansible_connection=local

[workers]
# worker ansible_host=192.168.1.10 ansible_user=admin ansible_port=2678

[masters]
# master ansible_host=192.168.1.10 ansible_user=admin ansible_port=2678
