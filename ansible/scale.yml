---
# =============================================================================
# SCALE CLUSTER — add node(s) to the existing Kubernetes cluster
# =============================================================================
# Prepares the new node's OS (server + docker roles), regenerates the kubespray
# inventory from the current Ansible inventory, then runs kubespray scale.yml.
#
# Usage (normally via the CLI: `selfhost node add <label>`):
#   ansible-playbook -i inventory/hosts.ini scale.yml -e target_node=<label> \
#     --limit <label>,localhost
#
# The node must already exist in the inventory (see `selfhost inventory generate`).

- name: Prepare new node(s) — base OS, security, container runtime
  hosts: "{{ target_node | default('workers') }}"
  become: true
  gather_facts: true
  any_errors_fatal: true
  roles:
    - role: server
    - role: docker

- name: Scale Kubernetes cluster via kubespray
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Clone/prepare kubespray and regenerate inventory (includes the new node)
      ansible.builtin.include_role:
        name: kubespray
        tasks_from: prepare.yml

    - name: Run kubespray scale to join the new node(s)
      ansible.builtin.include_role:
        name: kubespray
        tasks_from: scale.yml
