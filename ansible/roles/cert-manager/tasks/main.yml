---
# cert-manager ClusterIssuer configuration

- name: Wait for cert-manager to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager
    namespace: "{{ cert_manager_namespace }}"
    wait: true
    wait_timeout: 300
    wait_condition:
      type: Available
      status: "True"

- name: Create Let's Encrypt ClusterIssuer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: "{{ cert_manager_issuer_name }}"
      spec:
        acme:
          email: "{{ cert_manager_issuer_email }}"
          server: "{{ cert_manager_acme_server }}"
          privateKeySecretRef:
            name: "{{ cert_manager_issuer_name }}"
          solvers:
            - http01:
                ingress:
                  ingressClassName: "{{ cert_manager_ingress_class }}"

- name: Create self-signed ClusterIssuer (for internal use)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: selfsigned-issuer
      spec:
        selfSigned: {}

- name: Verify ClusterIssuer is ready
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: ClusterIssuer
    name: "{{ cert_manager_issuer_name }}"
  register: issuer_info
  until: issuer_info.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0
  retries: 10
  delay: 10
