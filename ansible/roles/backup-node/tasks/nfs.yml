---
# NFS server setup for backup node

- name: Install NFS server packages
  ansible.builtin.apt:
    name:
      - nfs-kernel-server
      - nfs-common
      - rpcbind
    state: present
    update_cache: true
  become: true
  tags: [backup-node, nfs, packages]

- name: Create backup group
  ansible.builtin.group:
    name: "{{ backup_group }}"
    gid: "{{ backup_gid }}"
    state: present
  become: true
  tags: [backup-node, nfs, users]

- name: Create backup user
  ansible.builtin.user:
    name: "{{ backup_user }}"
    uid: "{{ backup_uid }}"
    group: "{{ backup_group }}"
    home: "{{ nfs_exports_dir }}"
    shell: /bin/false
    system: true
    create_home: false
  become: true
  tags: [backup-node, nfs, users]

- name: Create backup directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ backup_user }}"
    group: "{{ backup_group }}"
    mode: "0755"
  become: true
  loop:
    - "{{ nfs_exports_dir }}"
    - "{{ nfs_restic_dir }}"
    - "{{ nfs_dumps_dir }}"
    - "{{ nfs_dumps_dir }}/postgres"
    - "{{ nfs_dumps_dir }}/mongodb"
    - "{{ nfs_dumps_dir }}/mysql"
  tags: [backup-node, nfs, directories]

- name: Configure NFS exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload NFS exports
  tags: [backup-node, nfs, config]

- name: Configure NFS server options
  ansible.builtin.template:
    src: nfs.conf.j2
    dest: /etc/nfs.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart NFS server
  tags: [backup-node, nfs, config]

- name: Enable and start NFS services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  become: true
  loop:
    - rpcbind
    - nfs-server
  tags: [backup-node, nfs, services]

- name: Configure firewall for NFS
  community.general.ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
    from: "{{ nfs_allowed_networks | join(',') }}"
    comment: "NFS server"
  become: true
  loop: "{{ firewall_ports }}"
  when: firewall_enabled
  tags: [backup-node, nfs, firewall]

- name: Verify NFS exports
  ansible.builtin.command: exportfs -v
  register: nfs_exports
  changed_when: false
  become: true
  tags: [backup-node, nfs, verify]

- name: Display NFS exports
  ansible.builtin.debug:
    msg: "{{ nfs_exports.stdout_lines }}"
  tags: [backup-node, nfs, verify]
