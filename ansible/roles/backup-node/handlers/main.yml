---
# Handlers for backup-node role

- name: Reload NFS exports
  ansible.builtin.command: exportfs -ra
  become: true

- name: Restart NFS server
  ansible.builtin.systemd:
    name: nfs-server
    state: restarted
  become: true

- name: Restart rpcbind
  ansible.builtin.systemd:
    name: rpcbind
    state: restarted
  become: true
