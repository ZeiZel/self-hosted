---
# Homebrew installation path
homebrew_install_path: "{{ '/opt/homebrew' if ansible_facts['os_family'] == 'Darwin' and ansible_facts['architecture'] == 'arm64' else '/usr/local' if ansible_facts['os_family'] == 'Darwin' else '/home/linuxbrew/.linuxbrew' }}"

# Tools to install via Homebrew
setup_host_tools:
  - name: git
  - name: python3
  - name: kubectl
  - name: helm
  - name: helmfile

# SSH key configuration
setup_host_ssh_key_name: id_ed25519
setup_host_ssh_key_type: ed25519
setup_host_ssh_key_comment: "{{ ansible_user }}@{{ ansible_hostname }}"

# SSH config management
setup_host_create_ssh_config: true

# Verification settings
setup_host_verify_installation: true
