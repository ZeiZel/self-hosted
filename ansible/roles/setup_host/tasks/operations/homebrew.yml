---
- name: Check if Homebrew is installed
  ansible.builtin.stat:
    path: "{{ homebrew_install_path }}/bin/brew"
  register: homebrew_check

- name: Install Homebrew on macOS
  ansible.builtin.shell: |
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when:
    - not homebrew_check.stat.exists
    - ansible_facts['os_family'] == "Darwin"
  environment:
    NONINTERACTIVE: "1"

- name: Install Homebrew on Linux
  ansible.builtin.shell: |
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when:
    - not homebrew_check.stat.exists
    - ansible_facts['os_family'] != "Darwin"
  environment:
    NONINTERACTIVE: "1"

- name: Add Homebrew to PATH for Linux (current session)
  ansible.builtin.set_fact:
    ansible_env: "{{ ansible_env | combine({'PATH': homebrew_install_path + '/bin:' + ansible_env.PATH}) }}"
  when:
    - ansible_facts['os_family'] != "Darwin"
    - not homebrew_check.stat.exists

- name: Add Homebrew to shell profile (macOS)
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.zprofile"
    line: 'eval "$({{ homebrew_install_path }}/bin/brew shellenv)"'
    create: true
    mode: "0644"
  when: ansible_facts['os_family'] == "Darwin"

- name: Add Homebrew to shell profile (Linux bash)
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.bashrc"
    block: |
      eval "$({{ homebrew_install_path }}/bin/brew shellenv)"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Homebrew"
    create: true
    mode: "0644"
  when: ansible_facts['os_family'] != "Darwin"

- name: Add Homebrew to shell profile (Linux zsh)
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.zshrc"
    block: |
      eval "$({{ homebrew_install_path }}/bin/brew shellenv)"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Homebrew"
    create: true
    mode: "0644"
  when: ansible_facts['os_family'] != "Darwin"

- name: Update Homebrew
  ansible.builtin.command: "{{ homebrew_install_path }}/bin/brew update"
  changed_when: false
