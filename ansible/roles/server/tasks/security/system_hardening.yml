---
# System hardening tasks

- name: Install security packages
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: true

- name: Disable unnecessary services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop: "{{ unnecessary_services | default(['bluetooth', 'cups', 'cups-browsed']) }}"
  ignore_errors: true

- name: Configure automatic security updates
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
