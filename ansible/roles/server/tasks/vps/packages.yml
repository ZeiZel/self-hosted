---
# VPS package management

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  when: vps_upgrade_packages | default(true)

- name: Install VPS essential packages
  ansible.builtin.apt:
    name: "{{ vps_essential_packages }}"
    state: present
