---
# Swap configuration for VPS

- name: Create swap file (if not exists)
  ansible.builtin.command: fallocate -l {{ vps_swap_size }} {{ vps_swap_path }}
  args:
    creates: "{{ vps_swap_path }}"

- name: Set swap file permissions
  ansible.builtin.file:
    path: "{{ vps_swap_path }}"
    mode: "0600"

- name: Format swap file
  ansible.builtin.command: mkswap {{ vps_swap_path }}
  when: ansible_swaptotal_mb == 0

- name: Enable swap
  ansible.builtin.command: swapon {{ vps_swap_path }}
  when: ansible_swaptotal_mb == 0

- name: Add swap to fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "{{ vps_swap_path }} none swap sw 0 0"
    state: present

- name: Set swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ vps_swappiness }}"
    state: present
