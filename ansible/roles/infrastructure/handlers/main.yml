---
# Infrastructure role handlers

- name: Reload kubeconfig
  ansible.builtin.command: kubectl config view
  changed_when: false
  listen: reload kubeconfig

- name: Verify helm
  ansible.builtin.command: helm version --short
  changed_when: false
  listen: verify helm

- name: Verify helmfile
  ansible.builtin.command: helmfile version
  changed_when: false
  listen: verify helmfile

- name: Verify kubectl
  ansible.builtin.command: kubectl version --client --short
  changed_when: false
  listen: verify kubectl
