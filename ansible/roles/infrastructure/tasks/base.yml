# ============================================================
# SUMMARY
# ============================================================

- name: Base infrastructure deployment complete
  debug:
    msg:
      - "========================================="
      - "All base infrastructure services deployed"
      - "========================================="
      - "Core Services:"
      - "  - Namespaces"
      - "  - OpenEBS (storage): {{ openebs_ready.rc | default(1) == 0 | ternary('Ready', 'Pending') }}"
      - "  - Traefik (ingress): Ready"
      - "  - Consul (service mesh): {{ consul_members.rc | default(1) == 0 | ternary('Ready', 'Pending') }}"
      - "  - Vault (secrets): Unsealed"
      - "  - cert-manager (TLS): Ready"
      - "Required Databases:"
      - "  - PostgreSQL: {{ postgresql_ready.rc == 0 | ternary('Ready', 'Pending') }}"
      - "  - Valkey: {{ valkey_ready.rc == 0 | ternary('Ready', 'Pending') }}"
      - "VPN:"
      - "  - Pangolin Server: {{ pangolin_server_ready.rc | default(1) == 0 | ternary('Ready', 'Pending') }}"
      - "  - Pangolin Client: {{ pangolin_ready.rc | default(1) == 0 | ternary('Ready', 'Pending') }}"
      - "Authentication:"
      - "  - Authentik (SSO): {{ authentik_ready.rc | default(1) == 0 | ternary('Ready', 'Pending') }}"
      - "Infrastructure:"
      - "  - Monitoring: {{ monitoring_ready.rc | default(1) == 0 | ternary('Ready', 'Pending') }}"
      - "  - Logging: {{ logging_ready.rc | default(1) == 0 | ternary('Ready', 'Pending') }}"
      - "  - Glance: {{ glance_ready.rc | default(1) == 0 | ternary('Ready', 'Pending') }}"
      - "  - Bytebase: {{ bytebase_ready.rc | default(1) == 0 | ternary('Ready', 'Pending') }}"
      - "========================================="
  tags: [infrastructure, base]
