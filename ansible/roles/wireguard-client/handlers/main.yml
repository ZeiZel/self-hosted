---
- name: Restart WireGuard
  ansible.builtin.shell: |
    {{ wireguard_config_dir }}/wg-down.sh || true
    {{ wireguard_config_dir }}/wg-up.sh
  become: true

- name: Load launchd service
  ansible.builtin.shell: |
    launchctl unload {{ ansible_env.HOME }}/Library/LaunchAgents/{{ wireguard_launchd_label }}.plist 2>/dev/null || true
    launchctl load {{ ansible_env.HOME }}/Library/LaunchAgents/{{ wireguard_launchd_label }}.plist
  changed_when: true
