---
- name: Check cluster connectivity
  command: >
    {{ kubespray_install_dir }}/venv/bin/ansible
    -i {{ kubespray_install_dir }}/inventory/{{ cluster_name }}/hosts.yaml
    all -m ping
  register: connectivity_check
  changed_when: false
  failed_when: false

- name: Display connectivity status
  debug:
    msg: "{{ connectivity_check.stdout }}"

- name: Check if Kubernetes cluster already exists
  stat:
    path: /etc/kubernetes/admin.conf
  register: cluster_exists
  delegate_to: "{{ groups['k8s_masters'][0] }}"
  run_once: true

- name: Determine deployment playbook (cluster.yml or scale.yml)
  set_fact:
    kubespray_playbook: "{{ 'scale.yml' if cluster_exists.stat.exists else 'cluster.yml' }}"

- name: Display deployment mode
  debug:
    msg: "Deploying using {{ kubespray_playbook }} (cluster exists: {{ cluster_exists.stat.exists }})"

- name: Setup SSH key for kubespray
  openssh_keypair:
    path: /root/.ssh/id_rsa
    type: rsa
    size: 4096
    state: present
  register: ssh_key

- name: Add SSH key to authorized_keys on localhost
  authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ ssh_key.public_key }}"
    state: present

- name: Test SSH connectivity to self
  command: ssh -o StrictHostKeyChecking=no {{ ansible_user }}@{{ ansible_host }} "echo ok"
  changed_when: false
  retries: 3
  delay: 5

- name: Run kubespray cluster deployment
  shell: >
    cd {{ kubespray_install_dir }}/kubespray &&
    {{ kubespray_install_dir }}/venv/bin/ansible-playbook
    -i {{ kubespray_install_dir }}/inventory/{{ cluster_name }}/hosts.yaml
    {{ kubespray_playbook }}
    -b
    -v
    --private-key /root/.ssh/id_rsa
  environment:
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_ROLES_PATH: "{{ kubespray_install_dir }}/kubespray/roles"
  register: kubespray_deploy
  async: 7200
  poll: 60

- name: Wait for kubespray deployment to complete
  async_status:
    jid: "{{ kubespray_deploy.ansible_job_id }}"
  register: job_result
  until: job_result.finished
  retries: 120
  delay: 30

- name: Check deployment result
  fail:
    msg: "Kubespray deployment failed"
  when: job_result.failed

- name: Copy kubeconfig to local machine
  fetch:
    src: "{{ kubespray_kubeconfig_path | default('/root/.kube/config') }}"
    dest: "{{ kubespray_local_kubeconfig_path | default('~/.kube/config') }}"
    flat: yes
  when: kubespray_copy_kubeconfig | default(true)

- name: Verify cluster is running
  command: >
    {{ kubespray_install_dir }}/venv/bin/ansible
    -i {{ kubespray_install_dir }}/inventory/{{ cluster_name }}/hosts.yaml
    kube_control_plane[0]
    -m shell
    -a "kubectl get nodes"
  register: cluster_status
  changed_when: false

- name: Display cluster status
  debug:
    msg: "{{ cluster_status.stdout }}"





