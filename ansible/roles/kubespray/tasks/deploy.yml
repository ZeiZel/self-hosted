---
# =============================================================================
# KUBESPRAY DEPLOYMENT TASKS
# =============================================================================
# Run kubespray cluster.yml playbook from localhost

# -----------------------------------------------------------------------------
# Pre-deployment Checks
# -----------------------------------------------------------------------------
- name: Verify kubespray directory exists
  stat:
    path: "{{ kubespray_dir }}/cluster.yml"
  register: cluster_yml_stat
  failed_when: not cluster_yml_stat.stat.exists

- name: Verify inventory exists
  stat:
    path: "{{ kubespray_inventory_dir }}/hosts.yaml"
  register: inventory_stat
  failed_when: not inventory_stat.stat.exists

- name: Verify virtualenv exists
  stat:
    path: "{{ kubespray_venv_dir }}/bin/ansible-playbook"
  register: ansible_playbook_stat
  failed_when: not ansible_playbook_stat.stat.exists

# -----------------------------------------------------------------------------
# Reset Cluster (Optional)
# -----------------------------------------------------------------------------
- name: Reset existing cluster (if requested)
  shell: |
    source {{ kubespray_venv_dir }}/bin/activate
    cd {{ kubespray_dir }}
    ansible-playbook -i {{ kubespray_inventory_dir }}/hosts.yaml \
      reset.yml \
      --become \
      --become-user={{ kubespray_become_user }} \
      --private-key={{ kubespray_ssh_key }} \
      -e reset_confirmation=yes \
      -v
  args:
    executable: /bin/bash
  environment:
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_DEPRECATION_WARNINGS: "False"
  when: kubespray_reset_before_deploy | default(false)
  register: kubespray_reset
  ignore_errors: true

# -----------------------------------------------------------------------------
# Deploy Kubernetes Cluster
# -----------------------------------------------------------------------------
- name: Display deployment start message
  debug:
    msg: |
      Starting Kubernetes cluster deployment...

      This may take 30-60 minutes depending on your network and hardware.

      Playbook: {{ kubespray_dir }}/cluster.yml
      Inventory: {{ kubespray_inventory_dir }}/hosts.yaml

- name: Run kubespray cluster.yml playbook
  shell: |
    source {{ kubespray_venv_dir }}/bin/activate
    cd {{ kubespray_dir }}
    ansible-playbook -i {{ kubespray_inventory_dir }}/hosts.yaml \
      cluster.yml \
      --become \
      --become-user={{ kubespray_become_user }} \
      -v
  args:
    executable: /bin/bash
  environment:
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_DEPRECATION_WARNINGS: "False"
    ANSIBLE_CALLBACKS_ENABLED: ""
  register: kubespray_deploy
  async: "{{ kubespray_deploy_timeout }}"
  poll: "{{ kubespray_poll_interval }}"

- name: Display deployment output
  debug:
    msg: "{{ kubespray_deploy.stdout_lines[-50:] }}"
  when: kubespray_deploy.stdout_lines is defined

- name: Check deployment result
  fail:
    msg: |
      Kubespray deployment failed!

      Error: {{ kubespray_deploy.stderr | default('Unknown error') }}

      Check the full output above for details.
  when: kubespray_deploy.rc != 0

# -----------------------------------------------------------------------------
# Fetch Kubeconfig
# -----------------------------------------------------------------------------
- name: Create local .kube directory
  file:
    path: "{{ user_home }}/.kube"
    state: directory
    mode: '0700'
  when: kubespray_fetch_kubeconfig

- name: Fetch kubeconfig from first master node
  shell: |
    ssh -o StrictHostKeyChecking=no \
      -i {{ kubespray_ssh_key }} \
      {{ hostvars[groups['masters'][0]]['ansible_user'] }}@{{ hostvars[groups['masters'][0]]['ansible_host'] }} \
      "sudo cat /etc/kubernetes/admin.conf"
  register: kubeconfig_content
  when: kubespray_fetch_kubeconfig

- name: Save kubeconfig locally
  copy:
    content: "{{ kubeconfig_content.stdout }}"
    dest: "{{ kubespray_local_kubeconfig }}"
    mode: '0600'
  when: kubespray_fetch_kubeconfig and kubeconfig_content.rc == 0

- name: Update kubeconfig server address
  replace:
    path: "{{ kubespray_local_kubeconfig }}"
    regexp: 'server: https://127\.0\.0\.1:6443'
    replace: "server: https://{{ hostvars[groups['masters'][0]]['ansible_host'] }}:6443"
  when: kubespray_fetch_kubeconfig and kubeconfig_content.rc == 0

- name: Deployment complete
  debug:
    msg: |
      Kubernetes cluster deployment completed!

      Kubeconfig saved to: {{ kubespray_local_kubeconfig }}

      Test the cluster:
        kubectl get nodes
        kubectl get pods -A
