---
# =============================================================================
# KUBESPRAY ROLE DEFAULTS
# =============================================================================
# This role runs on localhost and deploys Kubernetes via kubespray to remote nodes

# Kubernetes version (without 'v' prefix - kubespray requirement)
kube_version: "1.32.0"

# Kubespray configuration
kubespray_repo: "https://github.com/kubernetes-sigs/kubespray.git"
kubespray_version: "v2.30.0"
kubespray_dir: "{{ lookup('env', 'HOME') }}/kubespray"
kubespray_inventory_dir: "{{ kubespray_dir }}/inventory/mycluster"
kubespray_venv_dir: "{{ kubespray_dir }}/venv"

# Cluster name
cluster_name: "k8s-cluster"

# Network configuration
pod_cidr: "10.233.64.0/18"
service_cidr: "10.233.0.0/18"
cni_plugin: "calico"

# Container runtime
container_manager: "containerd"

# Kube proxy mode: iptables, ipvs
kube_proxy_mode: "ipvs"

# DNS configuration
dns_mode: "coredns"

# Etcd deployment: host, kubeadm, docker
etcd_deployment_type: "host"

# Addons
helm_enabled: true
metrics_server_enabled: true

# Kubeconfig
kubeconfig_localhost: true
kubectl_localhost: true
kubespray_fetch_kubeconfig: true
kubespray_local_kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"

# Deployment options
kubespray_force_clone: false
kubespray_skip_downloads: false
kubespray_reset_before_deploy: false

# Timeouts
kubespray_deploy_timeout: 7200
kubespray_poll_interval: 30

# SSH configuration for kubespray
kubespray_ssh_key: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
kubespray_become: true
kubespray_become_user: "root"

# =============================================================================
# POST-INSTALL CONFIGURATION
# =============================================================================

# Storage provisioner
local_path_provisioner_version: "0.0.30"

# Traefik ingress controller
traefik_nodeport_http: 30080
traefik_nodeport_https: 30443

# Post-install options
kubespray_post_install: true

# =============================================================================
# SERVICES DEPLOYMENT CONFIGURATION
# =============================================================================

# Enable/disable services deployment
kubespray_deploy_services: true

# Path to custom Helm charts
kubernetes_charts_dir: "{{ playbook_dir }}/../kubernetes/charts"

# Domain configuration
domain:
  public: "zeizel.ru"
  local: "zeizel.local"

# Database passwords (override in vault)
database_password: "postgres123"
valkey_password: "valkey123"

# Service passwords (override in vault)
authentik_secret_key: "changeme-secret-key-32-chars-min"
authentik_admin_password: "admin123"
grafana_password: "admin123"

# =============================================================================
# GATEWAY JOIN CONFIGURATION
# =============================================================================

# Enable joining gateway node to cluster
kubespray_join_gateway: false

# Taint gateway node to prevent regular workloads
# Only pangolin-server with toleration will schedule on it
kubespray_gateway_taint: true
