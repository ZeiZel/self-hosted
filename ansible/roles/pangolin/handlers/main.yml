---
# Pangolin VPN handlers

- name: restart pangolin
  systemd:
    name: pangolin
    state: restarted
    daemon_reload: yes
  listen: restart pangolin

- name: restart gerbil
  systemd:
    name: gerbil
    state: restarted
    daemon_reload: yes
  listen: restart gerbil

- name: restart traefik
  systemd:
    name: traefik
    state: restarted
    daemon_reload: yes
  listen: restart traefik

- name: restart wireguard
  systemd:
    name: "wg-quick@wg0"
    state: restarted
    daemon_reload: yes
  listen: restart wireguard

- name: restart wireguard-server
  systemd:
    name: "wg-quick@wg0"
    state: restarted
    daemon_reload: yes
  listen: restart wireguard-server

- name: reload ufw
  ufw:
    state: reloaded
  listen: reload ufw

- name: reload sysctl
  command: sysctl --system
  listen: reload sysctl
