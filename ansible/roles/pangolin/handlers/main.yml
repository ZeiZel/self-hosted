---
# Pangolin VPN handlers

- name: Restart pangolin
  ansible.builtin.systemd:
    name: pangolin
    state: restarted
    daemon_reload: true
  listen: restart pangolin

- name: Restart gerbil
  ansible.builtin.systemd:
    name: gerbil
    state: restarted
    daemon_reload: true
  listen: restart gerbil

- name: Restart traefik
  ansible.builtin.systemd:
    name: traefik
    state: restarted
    daemon_reload: true
  listen: restart traefik

- name: Restart wireguard
  ansible.builtin.systemd:
    name: "wg-quick@wg0"
    state: restarted
    daemon_reload: true
  listen: restart wireguard

- name: Restart wireguard-server
  ansible.builtin.systemd:
    name: "wg-quick@wg0"
    state: restarted
    daemon_reload: true
  listen: restart wireguard-server

- name: Reload ufw
  community.general.ufw:
    state: reloaded
  listen: reload ufw

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  listen: reload sysctl
