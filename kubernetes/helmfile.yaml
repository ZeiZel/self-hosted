# build
bases:
  - .helmfile/environments.yaml.gotmpl
---
bases:
  - .helmfile/repositories.yaml
  - .helmfile/releases.yaml.gotmpl
helmDefaults:
  wait: true
  atomic: true
  # force (helm --force-replace) is incompatible with Helm 4's default
  # server-side apply ("cannot use server-side apply and force replace together")
  # and does a destructive delete+recreate. Left off for Helm 4 compatibility.
  devel: true
  createNamespace: true
