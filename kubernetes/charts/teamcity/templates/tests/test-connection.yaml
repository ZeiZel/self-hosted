apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "teamcity.fullname" . }}-test-connection"
  labels:
    {{- include "teamcity.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['sh', '-c']
      args:
        - |
          # Test TeamCity server
          curl -sf http://{{ include "teamcity.fullname" . }}-server:8111 || exit 1
          echo "TeamCity server OK"
