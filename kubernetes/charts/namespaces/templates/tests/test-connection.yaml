apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "namespaces.fullname" . }}-test-namespaces"
  labels:
    {{- include "namespaces.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: check-namespaces
      image: registry.k8s.io/kubectl:v1.36.2
      command: ['kubectl']
      args: ['get', 'namespaces', '-l', 'app.kubernetes.io/managed-by=Helm']
