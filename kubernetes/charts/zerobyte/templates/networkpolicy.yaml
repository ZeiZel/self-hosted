{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zerobyte.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zerobyte.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "zerobyte.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow ingress from Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}

    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              name: service
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.metrics.port }}

  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53

    # Allow HTTPS outbound (for updates, etc.)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

    {{- if .Values.networkPolicy.egressRules.allowNFS }}
    # Allow NFS to backup server
    - to:
        - ipBlock:
            cidr: {{ .Values.restic.nfs.server }}/32
      ports:
        - protocol: TCP
          port: 2049
        - protocol: UDP
          port: 2049
        - protocol: TCP
          port: 111
        - protocol: UDP
          port: 111
    {{- end }}

    {{- if .Values.networkPolicy.egressRules.allowS3 }}
    # Allow S3/MinIO access
    - to:
        - namespaceSelector:
            matchLabels:
              name: db
          podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000
    {{- end }}

    # Allow Consul
    - to:
        - namespaceSelector:
            matchLabels:
              name: service
          podSelector:
            matchLabels:
              app.kubernetes.io/name: consul
      ports:
        - protocol: TCP
          port: 8500

    # Allow Vault
    - to:
        - namespaceSelector:
            matchLabels:
              name: service
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - protocol: TCP
          port: 8200
{{- end }}
