{{- if not .Values.vault.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zerobyte.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zerobyte.labels" . | nindent 4 }}
type: Opaque
stringData:
  restic-password: {{ .Values.restic.passwordSecret | default "changeme" | quote }}
  {{- if eq .Values.restic.repositoryType "s3" }}
  s3-access-key: {{ .Values.restic.s3.accessKey | default "" | quote }}
  s3-secret-key: {{ .Values.restic.s3.secretKey | default "" | quote }}
  {{- end }}
{{- end }}
