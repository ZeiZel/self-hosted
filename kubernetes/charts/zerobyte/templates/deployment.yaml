apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zerobyte.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zerobyte.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "zerobyte.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zerobyte.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: {{ include "zerobyte.name" . }}
        consul.hashicorp.com/connect-service-port: "{{ .Values.service.port }}"
        consul.hashicorp.com/service-tags: {{ .Values.consul.tags | join "," | quote }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        {{- range .Values.vault.secrets }}
        vault.hashicorp.com/agent-inject-secret-{{ .key }}: {{ .path | quote }}
        {{- end }}
        {{- end }}
        co.elastic.logs/enabled: "true"
        prometheus.io/scrape: "{{ .Values.metrics.enabled }}"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "{{ .Values.metrics.path }}"
    spec:
      serviceAccountName: {{ include "zerobyte.serviceAccountName" . }}
      securityContext:
        fsGroup: {{ .Values.securityContext.fsGroup }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: zerobyte
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
            {{- if .Values.metrics.enabled }}
            - containerPort: {{ .Values.metrics.port }}
              name: metrics
            {{- end }}
          env:
            # restic-browser configuration
            - name: CONFIG_DB_PATH
              value: "/data/config.db"
            - name: RESTIC_CACHE_DIR
              value: "/cache"
            # Standard restic env vars (for compatibility)
            - name: RESTIC_REPOSITORY
              {{- if eq .Values.restic.repositoryType "nfs" }}
              value: "/repo"
              {{- else if eq .Values.restic.repositoryType "s3" }}
              value: "s3:{{ .Values.restic.s3.endpoint }}/{{ .Values.restic.s3.bucket }}"
              {{- end }}
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "zerobyte.fullname" . }}-secrets
                  key: restic-password
            {{- if eq .Values.restic.repositoryType "s3" }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "zerobyte.fullname" . }}-secrets
                  key: s3-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "zerobyte.fullname" . }}-secrets
                  key: s3-secret-key
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /data
            - name: cache
              mountPath: /cache
            {{- if eq .Values.restic.repositoryType "nfs" }}
            - name: nfs-repository
              mountPath: /repo
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      volumes:
        - name: config
          {{- if .Values.persistence.config.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "zerobyte.fullname" . }}-config
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: cache
          {{- if .Values.persistence.cache.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "zerobyte.fullname" . }}-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if eq .Values.restic.repositoryType "nfs" }}
        - name: nfs-repository
          nfs:
            server: {{ .Values.restic.nfs.server }}
            path: {{ .Values.restic.nfs.path }}
        {{- end }}
        - name: tmp
          emptyDir: {}
