# zerobyte — rendered entirely by the chart-base subchart.
# Web UI for Restic backups (Deployment) + scheduled restic backup CronJobs.
chart-base:
  workloads:
    # --- Restic Browser web UI (main Deployment) ---
    - kind: Deployment
      replicas: 1
      podAnnotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: zerobyte
        consul.hashicorp.com/connect-service-port: "8080"
        consul.hashicorp.com/service-tags: "backup,zerobyte,infrastructure"
        co.elastic.logs/enabled: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zerobyte
          image: floibach/restic-browser:v0.1.8
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 9090, name: metrics }
          env:
            - { name: CONFIG_DB_PATH, value: "/data/config.db" }
            - { name: RESTIC_CACHE_DIR, value: "/cache" }
            - { name: RESTIC_REPOSITORY, value: "/repo" }
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zerobyte-secrets
                  key: restic-password
          volumeMounts:
            - { name: config, mountPath: /data }
            - { name: cache, mountPath: /cache }
            - { name: nfs-repository, mountPath: /repo, readOnly: true }
            - { name: tmp, mountPath: /tmp }
          resources:
            limits: { cpu: 500m, memory: 512Mi }
            requests: { cpu: 100m, memory: 128Mi }
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Zerobyte needs write access
            capabilities:
              drop: [ALL]
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: zerobyte-config }
        - name: cache
          persistentVolumeClaim: { claimName: zerobyte-cache }
        - name: nfs-repository
          nfs: { server: 192.168.100.104, path: /backup/restic }
        - name: tmp
          emptyDir: {}

    # --- Backup CronJob: postgres-data ---
    - name: postgres-data
      kind: CronJob
      schedule: "0 2 * * *"
      concurrencyPolicy: Forbid
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backup
          image: restic/restic:0.17.3  # Pinned version - do not use :latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting backup for postgres-data from db/data-postgresql-0"

              # Initialize repository if needed
              restic snapshots || restic init

              # Run backup
              restic backup /data \
                --tag postgres-data \
                --tag db \
                --tag kubernetes \
                --verbose

              # Apply retention policy
              restic forget \
                --keep-last 7 \
                --keep-daily 7 \
                --keep-weekly 4 \
                --keep-monthly 12 \
                --keep-yearly 2 \
                --prune

              # Verify backup integrity
              restic check --read-data-subset=5%

              echo "Backup completed for postgres-data"
          env:
            - { name: RESTIC_REPOSITORY, value: "/repository" }
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zerobyte-secrets
                  key: restic-password
          volumeMounts:
            - { name: data, mountPath: /data, readOnly: true }
            - { name: nfs-repository, mountPath: /repository }
            - { name: cache, mountPath: /root/.cache/restic }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: data-postgresql-0 }
        - name: nfs-repository
          nfs: { server: 192.168.100.104, path: /backup/restic }
        - name: cache
          emptyDir: {}

    # --- Backup CronJob: mongodb-data ---
    - name: mongodb-data
      kind: CronJob
      schedule: "0 3 * * *"
      concurrencyPolicy: Forbid
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backup
          image: restic/restic:0.17.3  # Pinned version - do not use :latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting backup for mongodb-data from db/datadir-mongodb-0"

              # Initialize repository if needed
              restic snapshots || restic init

              # Run backup
              restic backup /data \
                --tag mongodb-data \
                --tag db \
                --tag kubernetes \
                --verbose

              # Apply retention policy
              restic forget \
                --keep-last 7 \
                --keep-daily 7 \
                --keep-weekly 4 \
                --keep-monthly 12 \
                --keep-yearly 2 \
                --prune

              # Verify backup integrity
              restic check --read-data-subset=5%

              echo "Backup completed for mongodb-data"
          env:
            - { name: RESTIC_REPOSITORY, value: "/repository" }
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zerobyte-secrets
                  key: restic-password
          volumeMounts:
            - { name: data, mountPath: /data, readOnly: true }
            - { name: nfs-repository, mountPath: /repository }
            - { name: cache, mountPath: /root/.cache/restic }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: datadir-mongodb-0 }
        - name: nfs-repository
          nfs: { server: 192.168.100.104, path: /backup/restic }
        - name: cache
          emptyDir: {}

    # --- Backup CronJob: minio-data ---
    - name: minio-data
      kind: CronJob
      schedule: "0 4 * * *"
      concurrencyPolicy: Forbid
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backup
          image: restic/restic:0.17.3  # Pinned version - do not use :latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting backup for minio-data from db/minio"

              # Initialize repository if needed
              restic snapshots || restic init

              # Run backup
              restic backup /data \
                --tag minio-data \
                --tag db \
                --tag kubernetes \
                --verbose

              # Apply retention policy
              restic forget \
                --keep-last 7 \
                --keep-daily 7 \
                --keep-weekly 4 \
                --keep-monthly 12 \
                --keep-yearly 2 \
                --prune

              # Verify backup integrity
              restic check --read-data-subset=5%

              echo "Backup completed for minio-data"
          env:
            - { name: RESTIC_REPOSITORY, value: "/repository" }
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zerobyte-secrets
                  key: restic-password
          volumeMounts:
            - { name: data, mountPath: /data, readOnly: true }
            - { name: nfs-repository, mountPath: /repository }
            - { name: cache, mountPath: /root/.cache/restic }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: minio }
        - name: nfs-repository
          nfs: { server: 192.168.100.104, path: /backup/restic }
        - name: cache
          emptyDir: {}

  services:
    - ports:
        - { name: http, port: 8080, targetPort: http, protocol: TCP }
        - { name: metrics, port: 9090, targetPort: metrics, protocol: TCP }

  pvcs:
    - { name: config, accessModes: [ReadWriteOnce], storageClass: openebs-hostpath, size: 1Gi }
    - { name: cache, accessModes: [ReadWriteOnce], storageClass: openebs-hostpath, size: 5Gi }

  secrets:
    - name: secrets
      type: Opaque
      stringData:
        restic-password: "zerobyte-restic-password"

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    # Cluster-wide access to back up PVCs across namespaces.
    clusterRules:
      - { apiGroups: [""], resources: [persistentvolumeclaims], verbs: [get, list, watch] }
      - { apiGroups: [""], resources: [pods], verbs: [get, list, watch, create, delete] }
      - { apiGroups: [""], resources: [pods/exec], verbs: [create] }
      - { apiGroups: [""], resources: [namespaces], verbs: [get, list] }

  serviceMonitor:
    enabled: true
    port: metrics
    path: /metrics
    interval: 30s

  routing:
    httpRoutes:
      - hostnames:
          - zerobyte.zeizel.ru
          - zerobyte.zeizel.local
        port: 8080
        authentik:
          enabled: false

  tests:
    enabled: true
    port: 8080

  # Custom zero-trust NetworkPolicy (specific peers/ports) — doesn't fit the
  # generic chart-base networkPolicy shape, so emitted verbatim here.
  networkPolicy:
    enabled: false

  extraManifests:
    - |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: zerobyte
        namespace: {{ .Release.Namespace }}
        labels:
          {{- include "chart-base.labels" . | nindent 6 }}
      spec:
        podSelector:
          matchLabels:
            {{- include "chart-base.selectorLabels" . | nindent 8 }}
        policyTypes:
          - Ingress
          - Egress
        ingress:
          # Allow ingress from Traefik
          - from:
              - namespaceSelector:
                  matchLabels:
                    name: ingress
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: traefik
            ports:
              - protocol: TCP
                port: 8080
          # Allow Prometheus scraping
          - from:
              - namespaceSelector:
                  matchLabels:
                    name: service
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: prometheus
            ports:
              - protocol: TCP
                port: 9090
        egress:
          # Allow DNS
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: kube-system
            ports:
              - protocol: UDP
                port: 53
          # Allow HTTPS outbound (for updates, etc.)
          - to:
              - namespaceSelector: {}
            ports:
              - protocol: TCP
                port: 443
          # Allow NFS to backup server
          - to:
              - ipBlock:
                  cidr: 192.168.100.104/32
            ports:
              - protocol: TCP
                port: 2049
              - protocol: UDP
                port: 2049
              - protocol: TCP
                port: 111
              - protocol: UDP
                port: 111
          # Allow S3/MinIO access
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: db
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: minio
            ports:
              - protocol: TCP
                port: 9000
          # Allow Consul
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: service
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: consul
            ports:
              - protocol: TCP
                port: 8500
          # Allow Vault
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: service
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: vault
            ports:
              - protocol: TCP
                port: 8200
