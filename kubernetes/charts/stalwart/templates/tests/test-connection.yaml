apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "stalwart.fullname" . }}-test-connection"
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: smtp-test
      image: busybox:1.36
      command: ['sh', '-c']
      args:
        - |
          # Test SMTP connection on port 25
          nc -zv {{ include "stalwart.fullname" . }} 25 && echo "SMTP OK" || exit 1
