# stalwart — rendered entirely by the chart-base subchart.
# Stalwart Mail & Collaboration Server. All resources are declared below under
# the `chart-base:` key and rendered by the shared chart-base library chart.
chart-base:
  # Match the original pod securityContext (adds runAsGroup); chart-base merges in
  # the mandatory runAsNonRoot/runAsUser/fsGroup/seccompProfile defaults.
  podSecurityContext:
    runAsGroup: 1000

  workloads:
    - kind: Deployment
      replicas: 1
      podAnnotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "stalwart"
        consul.hashicorp.com/connect-service-port: "25"
        consul.hashicorp.com/service-tags: "stalwart,mail-server,smtp,imap"
        # ELK Filebeat logging
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        co.elastic.logs.json.message_key: "message"
        # Prometheus metrics
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
      containers:
        - name: stalwart
          image: stalwartlabs/stalwart:v0.10.8
          imagePullPolicy: IfNotPresent
          ports:
            # Mail ports
            - { containerPort: 25, name: smtp, protocol: TCP }
            - { containerPort: 587, name: submission, protocol: TCP }
            - { containerPort: 465, name: smtps, protocol: TCP }
            - { containerPort: 143, name: imap, protocol: TCP }
            - { containerPort: 993, name: imaps, protocol: TCP }
            - { containerPort: 110, name: pop3, protocol: TCP }
            - { containerPort: 995, name: pop3s, protocol: TCP }
            - { containerPort: 4190, name: managesieve, protocol: TCP }
            # HTTP ports
            - { containerPort: 80, name: http, protocol: TCP }
            - { containerPort: 443, name: https, protocol: TCP }
          envFrom:
            - secretRef:
                name: stalwart-secrets
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - { name: data, mountPath: /opt/stalwart/data }
            - { name: config, mountPath: /opt/stalwart/config }
            - { name: stalwart-config, mountPath: /opt/stalwart/etc }
            - { name: logs, mountPath: /opt/stalwart-mail/logs }
            - { name: tmp, mountPath: /tmp }
          livenessProbe:
            tcpSocket:
              port: 143
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 143
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stalwart-data
        - name: config
          persistentVolumeClaim:
            claimName: stalwart-config
        - name: stalwart-config
          configMap:
            name: stalwart-config
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}

  services:
    - annotations:
        consul.hashicorp.com/service-name: "stalwart"
        consul.hashicorp.com/service-port: "80"
        consul.hashicorp.com/service-tags: "stalwart,mail-server,smtp,imap"
      type: ClusterIP
      ports:
        # Mail ports
        - { port: 25, targetPort: 25, name: smtp, protocol: TCP }
        - { port: 587, targetPort: 587, name: submission, protocol: TCP }
        - { port: 465, targetPort: 465, name: smtps, protocol: TCP }
        - { port: 143, targetPort: 143, name: imap, protocol: TCP }
        - { port: 993, targetPort: 993, name: imaps, protocol: TCP }
        - { port: 110, targetPort: 110, name: pop3, protocol: TCP }
        - { port: 995, targetPort: 995, name: pop3s, protocol: TCP }
        - { port: 4190, targetPort: 4190, name: managesieve, protocol: TCP }
        # HTTP ports
        - { port: 80, targetPort: 80, name: http, protocol: TCP }
        - { port: 443, targetPort: 443, name: https, protocol: TCP }

  pvcs:
    - { name: data, accessModes: [ReadWriteOnce], storageClass: local-path, size: 5Gi }
    - { name: config, accessModes: [ReadWriteOnce], storageClass: local-path, size: 5Gi }

  configMaps:
    - name: config
      data:
        stalwart.toml: |
          # Stalwart Mail Server Configuration
          [server]
          hostname = ["mail.localhost"]

          [[server.listener.smtp]]
          bind = ["0.0.0.0:25"]
          greeting = "Welcome to Stalwart Mail Server"

          [[server.listener.submission]]
          bind = ["0.0.0.0:587"]

          [[server.listener.smtps]]
          bind = ["0.0.0.0:465"]

          [[server.listener.imap]]
          bind = ["0.0.0.0:143"]

          [[server.listener.imaps]]
          bind = ["0.0.0.0:993"]

          [[server.listener.pop3]]
          bind = ["0.0.0.0:110"]

          [[server.listener.pop3s]]
          bind = ["0.0.0.0:995"]

          [[server.listener.managesieve]]
          bind = ["0.0.0.0:4190"]

          [[server.listener.http]]
          bind = ["0.0.0.0:80"]

          [[server.listener.https]]
          bind = ["0.0.0.0:443"]

          # Storage configuration
          [storage]
          data = "sqlite:///opt/stalwart/data/stalwart.db"
          blob = "filecache:///opt/stalwart/data"
          fts = "sqlite:///opt/stalwart/data/fts.db"
          directory = "internal"

          # LDAP Directory Configuration (Authentik)
          [directory."ldap"]
          type = "ldap"
          url = "ldap://authentik.service.svc.cluster.local:389"
          timeout = "30s"

          [directory."ldap".tls]
          enable = false
          allow-invalid-certs = true

          # LDAP bind credentials - secret injected via Vault
          [directory."ldap".bind]
          dn = "cn=admin,dc=authentik,dc=local"
          secret = "%{env:LDAP_BIND_PASSWORD}%"  # Injected via Vault - see vault.hashicorp.com annotations

          # LDAP authentication method
          [directory."ldap".auth]
          mechanism = "bind"
          base-dn = "ou=users,dc=authentik,dc=local"
          filter = "(&(objectClass=user)(uid={username}))"
          username-attribute = "uid"
          mail-attribute = "mail"
          name-attribute = "cn"

          # Accounts configuration
          [directory."ldap".attributes]
          mail-from = "noreply@mail.localhost"
          quota = 2147483648  # 2GB

          # SMTP rate limiting
          [smtp]
          max-message-size = 5.24288e+07

          [smtp.rate-limit]
          requests = 100
          period = "1m"

          # IMAP rate limiting
          [imap]
          max-connections = 100

          # JMAP configuration
          [jmap]
          enabled = true

          # Web UI configuration
          [webadmin]
          enabled = true
          port = 443

          # Let's Encrypt (optional, если нужно получить сертификат)
          [certificate.acme]
          enable = false
          renew = 30

          # или self-signed для текущей конфигурации
          [certificate.self-signed]
          enable = true

          # Logging
          [log]
          level = "info"
          fmt = "json"

  secrets:
    - name: secrets
      type: Opaque
      stringData:
        # Domain configuration
        STALWART_HOSTNAME: mail.localhost
        # LDAP для Authentik
        LDAP_HOST: authentik.service.svc.cluster.local
        LDAP_PORT: "389"
        LDAP_BIND_DN: cn=admin,dc=authentik,dc=local
        LDAP_BIND_PASSWORD: ""
        LDAP_BASE_DN: ou=users,dc=authentik,dc=local
        LDAP_AUTH_METHOD: bind

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    clusterRules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [secrets], verbs: [get, list] }

  networkPolicy:
    enabled: true
    allowDB: false
    # base ingress rule (from namespaceSelector name=ingress) covers Traefik;
    # this adds the same-namespace traffic the original allowed.
    extraIngress:
      - from:
          - podSelector: {}
    # base egress already allows DNS; these add external HTTP/HTTPS, Consul, Vault.
    extraEgress:
      - to:
          - namespaceSelector: {}
        ports:
          - protocol: TCP
            port: 443
      - to:
          - namespaceSelector: {}
        ports:
          - protocol: TCP
            port: 80
      - to:
          - namespaceSelector:
              matchLabels:
                name: service
            podSelector:
              matchLabels:
                app.kubernetes.io/name: consul
        ports:
          - protocol: TCP
            port: 8500
          - protocol: TCP
            port: 8600
      - to:
          - namespaceSelector:
              matchLabels:
                name: service
            podSelector:
              matchLabels:
                app.kubernetes.io/name: vault
        ports:
          - protocol: TCP
            port: 8200

  serviceMonitor:
    enabled: true
    port: metrics
    path: /metrics
    interval: 30s

  pdb:
    enabled: false

  routing:
    httpRoutes:
      - host: mail.localhost
        port: 443
        authentik:
          enabled: false

  tests:
    enabled: true
    port: 80
