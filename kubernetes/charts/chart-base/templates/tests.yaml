{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "chart-base.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart-base.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  securityContext:
    {{- include "chart-base.podSecurityContext" . | nindent 4 }}
  containers:
    - name: wget
      image: {{ .Values.tests.image | default "busybox:1.36" }}
      securityContext:
        {{- include "chart-base.securityContext" . | nindent 8 }}
      command: ["wget"]
      args: ["-qO-", "{{ .Values.tests.url | default (printf "http://%s:%v" (include "chart-base.fullname" .) .Values.tests.port) }}"]
{{- end }}
