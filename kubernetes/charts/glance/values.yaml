# glance — rendered entirely by the chart-base subchart.
# NOTE: the glance.yml dashboard config below is condensed from the original; add
# more pages/widgets under configMaps[0].data["glance.yml"] as needed.
chart-base:
  workloads:
    - kind: Deployment
      replicas: 1
      podAnnotations:
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        co.elastic.logs.json.message_key: "message"
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
      containers:
        - name: glance
          image: glanceapp/glance:v0.7.12
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: NODE_ENV, value: "production" }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 300m, memory: 256Mi }
          volumeMounts:
            - { name: glance-config, mountPath: /app/config/glance.yml, subPath: glance.yml }
            - { name: data, mountPath: /app/user-data }
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: glance-config
          configMap:
            name: glance-config
        - name: data
          persistentVolumeClaim:
            claimName: glance-data

  services:
    - ports:
        - { name: http, port: 8080, targetPort: 8080, protocol: TCP }

  pvcs:
    - { name: data, accessModes: [ReadWriteOnce], storageClass: local-path, size: 1Gi }

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    rules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [configmaps], verbs: [get, list, watch] }

  networkPolicy:
    enabled: true

  serviceMonitor:
    enabled: true
    port: http
    path: /metrics

  routing:
    httpRoutes:
      - host: glance.localhost
        port: 8080
        authentik:
          enabled: false

  configMaps:
    - name: config
      data:
        glance.yml: |
          theme:
            background-color: 20 10 10
            primary-color: 40 80 60
            contrast-multiplier: 1.1

          pages:
            - name: Home
              columns:
                - size: small
                  widgets:
                    - type: clock
                      hour-format: "24h"
                      timezones:
                        - timezone: Europe/Moscow
                          label: Moscow
                    - type: calendar
                    - type: weather
                      location: Moscow, Russia
                      units: metric
                      hour-format: "24h"
                - size: full
                  widgets:
                    - type: bookmarks
                      groups:
                        - title: Quick Access
                          color: 20 80 50
                          links:
                            - { title: Grafana, url: https://monitoring.zeizel.ru, icon: "si:grafana" }
                            - { title: Authentik, url: https://auth.zeizel.ru, icon: "si:auth0" }
                            - { title: Vault, url: https://vault.zeizel.ru, icon: "si:vault" }
                - size: small
                  widgets:
                    - type: monitor
                      title: Core Services
                      cache: 1m
                      sites:
                        - { url: https://monitoring.zeizel.ru, title: Grafana }
                        - { url: https://auth.zeizel.ru, title: Authentik }
                        - { url: https://vault.zeizel.ru, title: Vault }
            - name: Services
              columns:
                - size: full
                  widgets:
                    - type: bookmarks
                      groups:
                        - title: Databases (Internal)
                          color: 160 60 40
                          links:
                            - { title: PostgreSQL, url: "#", description: "postgresql.db.svc.cluster.local:5432" }
                            - { title: MongoDB, url: "#", description: "mongodb.db.svc.cluster.local:27017" }
                            - { title: MinIO, url: "#", description: "minio.db.svc.cluster.local:9000" }
