{{- if .Values.ingress.enabled }}
{{/*
Gateway API HTTPRoute (replaces the former Ingress). Attaches to the shared
cluster Gateway; Authentik SSO preserved via a Traefik Middleware ExtensionRef.
*/}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "glance.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glance.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.gateway | default "shared-gateway" }}
      namespace: {{ .Values.ingress.gatewayNamespace | default "ingress" }}
  hostnames:
    - {{ .Values.ingress.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      {{- if .Values.authentik.enabled }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Values.authentik.middleware | default "authentik-forward-auth" }}
      {{- end }}
      backendRefs:
        - name: {{ include "glance.fullname" . }}
          port: {{ .Values.glance.service.port }}
{{- end }}
