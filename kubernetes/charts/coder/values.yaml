# coder — rendered entirely by the chart-base subchart.
# Env-style config ConfigMap, both Ingresses, the cluster RBAC trio (SA+ClusterRole+
# ClusterRoleBinding), the custom NetworkPolicy and the Helm test Pod are relocated
# verbatim into extraManifests; file-style ConfigMaps use typed configMaps[].
chart-base:
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
  workloads:
  - kind: Deployment
    replicas: 1
    podAnnotations:
      consul.hashicorp.com/connect-inject: 'true'
      consul.hashicorp.com/connect-service: coder
      consul.hashicorp.com/connect-service-port: '3000'
      consul.hashicorp.com/service-tags: coder,development,remote-ide
      co.elastic.logs/enabled: 'true'
      co.elastic.logs.json.keys_under_root: 'true'
      co.elastic.logs.json.add_error_key: 'true'
      co.elastic.logs.json.message_key: message
      prometheus.io/scrape: 'true'
      prometheus.io/port: '2112'
      prometheus.io/path: /metrics
    containers:
    - name: coder
      image: ghcr.io/coder/coder:v2.33.11
      imagePullPolicy: IfNotPresent
      command:
      - /opt/coder
      - server
      ports:
      - name: http
        containerPort: 3000
        protocol: TCP
      - name: metrics
        containerPort: 2112
        protocol: TCP
      envFrom:
      - configMapRef:
          name: coder-config
      env:
      - name: CODER_PG_CONNECTION_URL
        valueFrom:
          secretKeyRef:
            name: coder-secrets
            key: postgres-url
      - name: CODER_PROVISIONER_DAEMON_PSK
        valueFrom:
          secretKeyRef:
            name: coder-secrets
            key: provisioner-psk
            optional: true
      livenessProbe:
        httpGet:
          path: /api/v2/buildinfo
          port: http
          scheme: HTTP
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /api/v2/buildinfo
          port: http
          scheme: HTTP
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
      resources:
        limits:
          cpu: 1000m
          memory: 2Gi
        requests:
          cpu: 200m
          memory: 512Mi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
          - ALL
      volumeMounts:
      - name: data
        mountPath: /home/coder
    volumes:
    - name: data
      persistentVolumeClaim:
        claimName: coder-pvc
  services:
  - annotations:
      consul.hashicorp.com/service-name: coder
      consul.hashicorp.com/service-port: '3000'
      consul.hashicorp.com/service-tags: coder,development,remote-ide
    ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 2112
      targetPort: metrics
      protocol: TCP
  secrets:
  - name: secrets
    stringData:
      postgres-url: postgres://coder:@postgresql.db.svc.cluster.local:5432/coder?sslmode=disable
  pvcs:
  - name: pvc
    accessModes:
    - ReadWriteOnce
    storageClass: local-path
    size: 10Gi
  serviceAccount:
    create: true
    automount: true
  serviceMonitor:
    enabled: true
    port: http
    path: /metrics
    interval: 30s
  networkPolicy:
    enabled: false
  rbac:
    create: false
  configMaps:
  - name: agentapi-config
    data:
      agentapi.yaml: "# Coder AgentAPI Configuration for AI Agents\n# This enables AI coding assistants to connect to workspaces\n\nenabled: true\n\n# Authentication configuration\nauthentication:\n  enabled: true\n  method: \"token\"  # Bearer token authentication\n  token_lifetime: \"720h\"\n  \n# Supported AI agents\nagents:\n  # Claude Code (Anthropic)\n  - name: \"claude-code\"\n    enabled: true\n    description: \"Anthropic Claude Code integration\"\n    capabilities:\n      - file_read\n      - file_write\n      - command_execution\n      - terminal_access\n    rate_limits:\n      requests_per_minute: 100\n      concurrent_operations: 10\n  \n  # Goose (Block)\n  - name: \"goose\"\n    enabled: true\n    description: \"Block Goose AI agent\"\n    capabilities:\n      - file_read\n      - file_write\n      - command_execution\n      - git_operations\n    rate_limits:\n      requests_per_minute: 100\n      concurrent_operations: 10\n  \n  # Aider (Paul Gauthier)\n  - name: \"aider\"\n    enabled: true\n    description: \"Aider AI pair programming\"\n    capabilities:\n      - file_read\n      - file_write\n      - git_operations\n      - diff_generation\n    rate_limits:\n      requests_per_minute: 150\n      concurrent_operations: 15\n  \n  # Cursor AI\n  - name: \"cursor\"\n    enabled: true\n    description: \"Cursor AI IDE\"\n    capabilities:\n      - file_read\n      - file_write\n      - command_execution\n      - lsp_support\n    rate_limits:\n      requests_per_minute: 200\n      concurrent_operations: 20\n  \n  # GitHub Copilot Workspace\n  - name: \"github-copilot\"\n    enabled: true\n    description: \"GitHub Copilot Workspace\"\n    capabilities:\n      - file_read\n      - file_write\n      - suggestions\n    rate_limits:\n      requests_per_minute: 100\n      concurrent_operations: 10\n  \n  # Generic agent support\n  - name: \"generic\"\n    enabled: true\n    description: \"Generic AI agent via HTTP API\"\n    capabilities:\n      - file_read\n      - file_write\n      - command_execution\n    rate_limits:\n      requests_per_minute: 50\n      concurrent_operations: 5\n\n# API endpoints\nendpoints:\n  # File operations\n  file_read: \"/api/v2/workspaces/{workspace_id}/agent/file/read\"\n  file_write: \"/api/v2/workspaces/{workspace_id}/agent/file/write\"\n  file_list: \"/api/v2/workspaces/{workspace_id}/agent/file/list\"\n  \n  # Command execution\n  exec: \"/api/v2/workspaces/{workspace_id}/agent/exec\"\n  terminal: \"/api/v2/workspaces/{workspace_id}/agent/terminal\"\n  \n  # Git operations\n  git_clone: \"/api/v2/workspaces/{workspace_id}/agent/git/clone\"\n  git_status: \"/api/v2/workspaces/{workspace_id}/agent/git/status\"\n  git_commit: \"/api/v2/workspaces/{workspace_id}/agent/git/commit\"\n  git_push: \"/api/v2/workspaces/{workspace_id}/agent/git/push\"\n  \n  # Workspace info\n  info: \"/api/v2/workspaces/{workspace_id}/agent/info\"\n  health: \"/api/v2/workspaces/{workspace_id}/agent/health\"\n\n# Security settings\nsecurity:\n  # Allowed operations\n  allow_file_write: true\n  allow_command_execution: true\n  allow_terminal_access: true\n  \n  # Path restrictions\n  restricted_paths:\n    - \"/etc\"\n    - \"/sys\"\n    - \"/proc\"\n    - \"/dev\"\n    - \"/var/run\"\n  \n  # Command restrictions\n  blocked_commands:\n    - \"rm -rf /\"\n    - \"dd if=\"\n    - \"mkfs\"\n    - \"fdisk\"\n  \n  # File size limits\n  max_file_size: \"100MB\"\n  max_files_per_operation: 1000\n\n# Logging and monitoring\nlogging:\n  enabled: true\n  level: \"info\"\n  audit_log: true\n  log_path: \"/var/log/coder/agentapi\"\n\nmonitoring:\n  prometheus_enabled: true\n  metrics_port: 2112\n  health_check_interval: \"30s\"\n"
      README.md: |-
        # Coder AgentAPI - AI Agent Integration Guide

        ## Overview

        The Coder AgentAPI enables AI coding assistants to connect directly to your development workspaces,
        allowing them to read files, write code, execute commands, and interact with your development environment.

        ## Supported AI Agents

        - **Claude Code** (Anthropic) - Advanced AI pair programming
        - **Goose** (Block) - Autonomous AI developer agent
        - **Aider** (Paul Gauthier) - AI pair programming in terminal
        - **Cursor AI** - AI-first code editor
        - **GitHub Copilot Workspace** - GitHub's AI development environment

        ## Authentication

        All API requests must include a Bearer token in the Authorization header:

        ```bash
        curl -H "Authorization: Bearer YOUR_TOKEN" \
             https://coder.coder.localhost/api/v2/workspaces/my-workspace/agent/info
        ```

        ## Getting an API Token

        1. Log into Coder: https://coder.coder.localhost
        2. Go to Account Settings → Tokens
        3. Create a new token with workspace access
        4. Copy the token and configure your AI agent

        ## Configuration Examples

        ### Claude Code

        ```json
        {
          "coder": {
            "url": "https://coder.coder.localhost",
            "workspace": "my-workspace",
            "token": "YOUR_TOKEN"
          }
        }
        ```

        ### Aider

        ```bash
        export CODER_URL="https://coder.coder.localhost"
        export CODER_WORKSPACE="my-workspace"
        export CODER_TOKEN="YOUR_TOKEN"

        aider --coder
        ```

        ### Goose

        ```yaml
        providers:
          coder:
            url: https://coder.coder.localhost
            workspace: my-workspace
            token: YOUR_TOKEN
        ```

        ## API Endpoints

        ### File Operations

        - `GET /api/v2/workspaces/{workspace}/agent/file/read?path=/path/to/file`
        - `POST /api/v2/workspaces/{workspace}/agent/file/write`
        - `GET /api/v2/workspaces/{workspace}/agent/file/list?path=/path`

        ### Command Execution

        - `POST /api/v2/workspaces/{workspace}/agent/exec`
        - `WS /api/v2/workspaces/{workspace}/agent/terminal`

        ### Git Operations

        - `POST /api/v2/workspaces/{workspace}/agent/git/clone`
        - `GET /api/v2/workspaces/{workspace}/agent/git/status`
        - `POST /api/v2/workspaces/{workspace}/agent/git/commit`

        ## Rate Limits

        - Standard agents: 100 requests/minute
        - Premium agents: 200 requests/minute
        - Burst allowance: 20 requests

        ## Security

        - All operations are scoped to the workspace
        - File access is restricted to workspace home directory
        - Dangerous commands are blocked
        - All operations are audit logged

        ## Troubleshooting

        Check agent logs:
        ```bash
        kubectl logs -n default -l app.kubernetes.io/name=coder -c coder --tail=100
        ```

        Test API connectivity:
        ```bash
        curl -H "Authorization: Bearer YOUR_TOKEN" \
             https://coder.coder.localhost/api/v2/buildinfo
        ```
  - name: dashboard
    data:
      coder-dashboard.json: |-
        {
          "dashboard": {
            "title": "Coder Metrics",
            "tags": ["coder", "development", "workspaces"],
            "timezone": "browser",
            "schemaVersion": 16,
            "version": 1,
            "refresh": "30s",
            "panels": [
              {
                "id": 1,
                "title": "Active Workspaces",
                "type": "stat",
                "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0},
                "targets": [
                  {
                    "expr": "coder_workspaces_active_total",
                    "refId": "A"
                  }
                ],
                "fieldConfig": {
                  "defaults": {
                    "color": {"mode": "thresholds"},
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        {"value": 0, "color": "green"},
                        {"value": 5, "color": "yellow"},
                        {"value": 10, "color": "red"}
                      ]
                    }
                  }
                }
              },
              {
                "id": 2,
                "title": "Total Users",
                "type": "stat",
                "gridPos": {"h": 8, "w": 6, "x": 6, "y": 0},
                "targets": [
                  {
                    "expr": "coder_users_total",
                    "refId": "A"
                  }
                ]
              },
              {
                "id": 3,
                "title": "API Request Rate",
                "type": "graph",
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
                "targets": [
                  {
                    "expr": "rate(coder_api_requests_total[5m])",
                    "legendFormat": "{{ method }} {{ path }}",
                    "refId": "A"
                  }
                ],
                "yaxes": [
                  {"format": "reqps", "label": "Requests/sec"},
                  {"format": "short"}
                ]
              },
              {
                "id": 4,
                "title": "Workspace CPU Usage",
                "type": "graph",
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
                "targets": [
                  {
                    "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"default\",pod=~\"coder-.*\"}[5m])) by (pod)",
                    "legendFormat": "{{ pod }}",
                    "refId": "A"
                  }
                ],
                "yaxes": [
                  {"format": "percentunit", "label": "CPU"},
                  {"format": "short"}
                ]
              },
              {
                "id": 5,
                "title": "Workspace Memory Usage",
                "type": "graph",
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
                "targets": [
                  {
                    "expr": "sum(container_memory_working_set_bytes{namespace=\"default\",pod=~\"coder-.*\"}) by (pod)",
                    "legendFormat": "{{ pod }}",
                    "refId": "A"
                  }
                ],
                "yaxes": [
                  {"format": "bytes", "label": "Memory"},
                  {"format": "short"}
                ]
              },
              {
                "id": 6,
                "title": "API Latency (p95)",
                "type": "graph",
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
                "targets": [
                  {
                    "expr": "histogram_quantile(0.95, rate(coder_api_request_duration_seconds_bucket[5m]))",
                    "legendFormat": "{{ method }} {{ path }}",
                    "refId": "A"
                  }
                ],
                "yaxes": [
                  {"format": "s", "label": "Latency"},
                  {"format": "short"}
                ]
              },
              {
                "id": 7,
                "title": "Workspace Builds",
                "type": "graph",
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
                "targets": [
                  {
                    "expr": "rate(coder_workspace_builds_total[5m])",
                    "legendFormat": "{{ status }}",
                    "refId": "A"
                  }
                ],
                "yaxes": [
                  {"format": "ops", "label": "Builds/sec"},
                  {"format": "short"}
                ]
              },
              {
                "id": 8,
                "title": "Database Connection Pool",
                "type": "graph",
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
                "targets": [
                  {
                    "expr": "coder_db_connections_active",
                    "legendFormat": "Active",
                    "refId": "A"
                  },
                  {
                    "expr": "coder_db_connections_idle",
                    "legendFormat": "Idle",
                    "refId": "B"
                  }
                ]
              },
              {
                "id": 9,
                "title": "AgentAPI Requests",
                "type": "graph",
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
                "targets": [
                  {
                    "expr": "rate(coder_agentapi_requests_total[5m])",
                    "legendFormat": "{{ agent }} - {{ operation }}",
                    "refId": "A"
                  }
                ],
                "yaxes": [
                  {"format": "reqps", "label": "Requests/sec"},
                  {"format": "short"}
                ]
              }
            ]
          }
        }
  - name: template-docker
    data:
      template.tf: "terraform {\n  required_providers {\n    coder = {\n      source = \"coder/coder\"\n    }\n    kubernetes = {\n      source = \"hashicorp/kubernetes\"\n    }\n  }\n}\n\nprovider \"coder\" {}\nprovider \"kubernetes\" {\n  config_path = null\n}\n\ndata \"coder_workspace\" \"me\" {}\n\nresource \"coder_agent\" \"main\" {\n  arch = \"amd64\"\n  os   = \"linux\"\n  \n  startup_script = <<-EOT\n    #!/bin/bash\n    set -e\n    \n    # Start Docker daemon\n    sudo dockerd > /var/log/docker.log 2>&1 &\n    \n    # Wait for Docker to be ready\n    timeout 30 sh -c 'until docker info > /dev/null 2>&1; do sleep 1; done'\n    \n    # Install common tools\n    sudo apt-get update\n    sudo apt-get install -y git curl wget vim nano htop build-essential\n    \n    # Configure git\n    if [ ! -z \"$GIT_AUTHOR_NAME\" ]; then\n      git config --global user.name \"$GIT_AUTHOR_NAME\"\n      git config --global user.email \"$GIT_AUTHOR_EMAIL\"\n    fi\n    \n    # Clone repository if specified\n    if [ ! -z \"$GIT_CLONE_URL\" ]; then\n      cd ~/workspace\n      git clone \"$GIT_CLONE_URL\" project || true\n      cd project\n    fi\n    \n    echo \"Docker-in-Docker workspace ready!\"\n  EOT\n\n  metadata {\n    display_name = \"Docker Version\"\n    key          = \"docker_version\"\n    script       = \"docker --version\"\n    interval     = 0\n    timeout      = 1\n  }\n\n  metadata {\n    display_name = \"Running Containers\"\n    key          = \"running_containers\"\n    script       = \"docker ps -q | wc -l\"\n    interval     = 30\n    timeout      = 2\n  }\n\n  metadata {\n    display_name = \"Docker Images\"\n    key          = \"docker_images\"\n    script       = \"docker images -q | wc -l\"\n    interval     = 60\n    timeout      = 2\n  }\n}\n\nresource \"kubernetes_pod\" \"main\" {\n  count = data.coder_workspace.me.start_count\n  \n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}\"\n    namespace = \"default\"\n    labels = {\n      \"app.kubernetes.io/name\"     = \"coder-workspace\"\n      \"app.kubernetes.io/instance\" = data.coder_workspace.me.name\n      \"app.kubernetes.io/owner\"    = data.coder_workspace.me.owner\n      \"coder.workspace\"            = \"true\"\n      \"coder.template\"             = \"docker\"\n    }\n  }\n\n  spec {\n    security_context {\n      run_as_user = 0  # Docker requires root\n      fs_group    = 0\n    }\n\n    container {\n      name  = \"dev\"\n      image = \"codercom/enterprise-base:ubuntu\"\n      \n      command = [\"/bin/bash\", \"-c\", coder_agent.main.init_script]\n      \n      security_context {\n        privileged = true  # Required for Docker-in-Docker\n      }\n\n      env {\n        name  = \"CODER_AGENT_TOKEN\"\n        value = coder_agent.main.token\n      }\n\n      env {\n        name  = \"DOCKER_TLS_CERTDIR\"\n        value = \"\"\n      }\n\n      resources {\n        requests = {\n          cpu    = \"500m\"\n          memory = \"1Gi\"\n        }\n        limits = {\n          cpu    = \"2\"\n          memory = \"4Gi\"\n        }\n      }\n\n      volume_mount {\n        mount_path = \"/home/coder\"\n        name       = \"home\"\n      }\n\n      volume_mount {\n        mount_path = \"/var/lib/docker\"\n        name       = \"docker-storage\"\n      }\n    }\n\n    volume {\n      name = \"home\"\n      persistent_volume_claim {\n        claim_name = kubernetes_persistent_volume_claim.home.metadata[0].name\n      }\n    }\n\n    volume {\n      name = \"docker-storage\"\n      empty_dir {}\n    }\n  }\n}\n\nresource \"kubernetes_persistent_volume_claim\" \"home\" {\n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}-home\"\n    namespace = \"default\"\n  }\n  wait_until_bound = false\n  spec {\n    access_modes = [\"ReadWriteOnce\"]\n    storage_class_name = \"local-path\"\n    resources {\n      requests = {\n        storage = \"50Gi\"\n      }\n    }\n  }\n}\n\nresource \"coder_app\" \"code-server\" {\n  agent_id     = coder_agent.main.id\n  slug         = \"code-server\"\n  display_name = \"VS Code\"\n  url          = \"http://localhost:13337/?folder=/home/coder\"\n  icon         = \"/icon/code.svg\"\n  subdomain    = false\n  share        = \"owner\"\n}"
  - name: template-go
    data:
      template.tf: "terraform {\n  required_providers {\n    coder = {\n      source = \"coder/coder\"\n    }\n    kubernetes = {\n      source = \"hashicorp/kubernetes\"\n    }\n  }\n}\n\nprovider \"coder\" {}\nprovider \"kubernetes\" {\n  config_path = null\n}\n\ndata \"coder_workspace\" \"me\" {}\n\nresource \"coder_agent\" \"main\" {\n  arch = \"amd64\"\n  os   = \"linux\"\n  \n  startup_script = <<-EOT\n    #!/bin/bash\n    set -e\n    \n    # Install common tools\n    sudo apt-get update\n    sudo apt-get install -y git curl wget vim nano htop build-essential\n    \n    # Configure git\n    if [ ! -z \"$GIT_AUTHOR_NAME\" ]; then\n      git config --global user.name \"$GIT_AUTHOR_NAME\"\n      git config --global user.email \"$GIT_AUTHOR_EMAIL\"\n    fi\n    \n    # Setup Go environment\n    export GOPATH=$HOME/go\n    export PATH=$PATH:$GOPATH/bin\n    \n    # Clone repository if specified\n    if [ ! -z \"$GIT_CLONE_URL\" ]; then\n      cd ~/workspace\n      git clone \"$GIT_CLONE_URL\" project || true\n      cd project\n      \n      # Download Go dependencies\n      if [ -f go.mod ]; then\n        go mod download\n      fi\n    fi\n  EOT\n\n  metadata {\n    display_name = \"Go Version\"\n    key          = \"go_version\"\n    script       = \"go version\"\n    interval     = 0\n    timeout      = 1\n  }\n\n  metadata {\n    display_name = \"Go Path\"\n    key          = \"go_path\"\n    script       = \"echo $GOPATH\"\n    interval     = 0\n    timeout      = 1\n  }\n}\n\nresource \"kubernetes_pod\" \"main\" {\n  count = data.coder_workspace.me.start_count\n  \n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}\"\n    namespace = \"default\"\n    labels = {\n      \"app.kubernetes.io/name\"     = \"coder-workspace\"\n      \"app.kubernetes.io/instance\" = data.coder_workspace.me.name\n      \"app.kubernetes.io/owner\"    = data.coder_workspace.me.owner\n      \"coder.workspace\"            = \"true\"\n      \"coder.template\"             = \"go\"\n    }\n  }\n\n  spec {\n    security_context {\n      run_as_user = 1000\n      fs_group    = 1000\n    }\n\n    container {\n      name  = \"dev\"\n      image = \"codercom/enterprise-golang:ubuntu\"\n      \n      command = [\"/bin/bash\", \"-c\", coder_agent.main.init_script]\n      \n      security_context {\n        run_as_user = 1000\n      }\n\n      env {\n        name  = \"CODER_AGENT_TOKEN\"\n        value = coder_agent.main.token\n      }\n\n      env {\n        name  = \"GOPATH\"\n        value = \"/home/coder/go\"\n      }\n\n      resources {\n        requests = {\n          cpu    = \"500m\"\n          memory = \"1Gi\"\n        }\n        limits = {\n          cpu    = \"2\"\n          memory = \"4Gi\"\n        }\n      }\n\n      volume_mount {\n        mount_path = \"/home/coder\"\n        name       = \"home\"\n      }\n    }\n\n    volume {\n      name = \"home\"\n      persistent_volume_claim {\n        claim_name = kubernetes_persistent_volume_claim.home.metadata[0].name\n      }\n    }\n  }\n}\n\nresource \"kubernetes_persistent_volume_claim\" \"home\" {\n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}-home\"\n    namespace = \"default\"\n  }\n  wait_until_bound = false\n  spec {\n    access_modes = [\"ReadWriteOnce\"]\n    storage_class_name = \"local-path\"\n    resources {\n      requests = {\n        storage = \"50Gi\"\n      }\n    }\n  }\n}\n\nresource \"coder_app\" \"code-server\" {\n  agent_id     = coder_agent.main.id\n  slug         = \"code-server\"\n  display_name = \"VS Code\"\n  url          = \"http://localhost:13337/?folder=/home/coder\"\n  icon         = \"/icon/code.svg\"\n  subdomain    = false\n  share        = \"owner\"\n}"
  - name: template-k8s
    data:
      template.tf: "terraform {\n  required_providers {\n    coder = {\n      source = \"coder/coder\"\n    }\n    kubernetes = {\n      source = \"hashicorp/kubernetes\"\n    }\n  }\n}\n\nprovider \"coder\" {}\nprovider \"kubernetes\" {\n  config_path = null\n}\n\ndata \"coder_workspace\" \"me\" {}\n\nresource \"coder_agent\" \"main\" {\n  arch = \"amd64\"\n  os   = \"linux\"\n  \n  startup_script = <<-EOT\n    #!/bin/bash\n    set -e\n    \n    # Install common tools\n    sudo apt-get update\n    sudo apt-get install -y git curl wget vim nano htop build-essential\n    \n    # Install kubectl\n    curl -LO \"https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl\"\n    sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl\n    rm kubectl\n    \n    # Install Helm\n    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash\n    \n    # Configure kubectl to use in-cluster config\n    export KUBECONFIG=/var/run/secrets/kubernetes.io/serviceaccount\n    \n    # Configure git\n    if [ ! -z \"$GIT_AUTHOR_NAME\" ]; then\n      git config --global user.name \"$GIT_AUTHOR_NAME\"\n      git config --global user.email \"$GIT_AUTHOR_EMAIL\"\n    fi\n    \n    # Clone repository if specified\n    if [ ! -z \"$GIT_CLONE_URL\" ]; then\n      cd ~/workspace\n      git clone \"$GIT_CLONE_URL\" project || true\n      cd project\n    fi\n    \n    echo \"Kubernetes native workspace ready!\"\n    kubectl version --client\n  EOT\n\n  metadata {\n    display_name = \"Kubectl Version\"\n    key          = \"kubectl_version\"\n    script       = \"kubectl version --client --short 2>/dev/null || echo 'Not installed'\"\n    interval     = 0\n    timeout      = 1\n  }\n\n  metadata {\n    display_name = \"Helm Version\"\n    key          = \"helm_version\"\n    script       = \"helm version --short 2>/dev/null || echo 'Not installed'\"\n    interval     = 0\n    timeout      = 1\n  }\n\n  metadata {\n    display_name = \"Cluster Info\"\n    key          = \"cluster_info\"\n    script       = \"kubectl cluster-info 2>/dev/null | head -1 || echo 'Not connected'\"\n    interval     = 60\n    timeout      = 2\n  }\n}\n\n# ServiceAccount for workspace with k8s API access\nresource \"kubernetes_service_account\" \"workspace\" {\n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}-sa\"\n    namespace = \"default\"\n  }\n}\n\n# Role for workspace operations\nresource \"kubernetes_role\" \"workspace\" {\n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}-role\"\n    namespace = \"default\"\n  }\n\n  rule {\n    api_groups = [\"\"]\n    resources  = [\"pods\", \"services\", \"configmaps\", \"secrets\"]\n    verbs      = [\"get\", \"list\", \"watch\", \"create\", \"update\", \"patch\", \"delete\"]\n  }\n\n  rule {\n    api_groups = [\"apps\"]\n    resources  = [\"deployments\", \"statefulsets\", \"daemonsets\"]\n    verbs      = [\"get\", \"list\", \"watch\", \"create\", \"update\", \"patch\", \"delete\"]\n  }\n\n  rule {\n    api_groups = [\"\"]\n    resources  = [\"pods/log\", \"pods/exec\"]\n    verbs      = [\"get\", \"create\"]\n  }\n}\n\n# RoleBinding for workspace\nresource \"kubernetes_role_binding\" \"workspace\" {\n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}-rb\"\n    namespace = \"default\"\n  }\n\n  role_ref {\n    api_group = \"rbac.authorization.k8s.io\"\n    kind      = \"Role\"\n    name      = kubernetes_role.workspace.metadata[0].name\n  }\n\n  subject {\n    kind      = \"ServiceAccount\"\n    name      = kubernetes_service_account.workspace.metadata[0].name\n    namespace = \"default\"\n  }\n}\n\nresource \"kubernetes_pod\" \"main\" {\n  count = data.coder_workspace.me.start_count\n  \n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}\"\n    namespace = \"default\"\n    labels = {\n      \"app.kubernetes.io/name\"     = \"coder-workspace\"\n      \"app.kubernetes.io/instance\" = data.coder_workspace.me.name\n      \"app.kubernetes.io/owner\"    = data.coder_workspace.me.owner\n      \"coder.workspace\"            = \"true\"\n      \"coder.template\"             = \"kubernetes\"\n    }\n  }\n\n  spec {\n    service_account_name = kubernetes_service_account.workspace.metadata[0].name\n\n    security_context {\n      run_as_user = 1000\n      fs_group    = 1000\n    }\n\n    container {\n      name  = \"dev\"\n      image = \"codercom/enterprise-base:ubuntu\"\n      \n      command = [\"/bin/bash\", \"-c\", coder_agent.main.init_script]\n      \n      security_context {\n        run_as_user = 1000\n      }\n\n      env {\n        name  = \"CODER_AGENT_TOKEN\"\n        value = coder_agent.main.token\n      }\n\n      resources {\n        requests = {\n          cpu    = \"500m\"\n          memory = \"1Gi\"\n        }\n        limits = {\n          cpu    = \"2\"\n          memory = \"4Gi\"\n        }\n      }\n\n      volume_mount {\n        mount_path = \"/home/coder\"\n        name       = \"home\"\n      }\n    }\n\n    volume {\n      name = \"home\"\n      persistent_volume_claim {\n        claim_name = kubernetes_persistent_volume_claim.home.metadata[0].name\n      }\n    }\n  }\n}\n\nresource \"kubernetes_persistent_volume_claim\" \"home\" {\n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}-home\"\n    namespace = \"default\"\n  }\n  wait_until_bound = false\n  spec {\n    access_modes = [\"ReadWriteOnce\"]\n    storage_class_name = \"local-path\"\n    resources {\n      requests = {\n        storage = \"50Gi\"\n      }\n    }\n  }\n}\n\nresource \"coder_app\" \"code-server\" {\n  agent_id     = coder_agent.main.id\n  slug         = \"code-server\"\n  display_name = \"VS Code\"\n  url          = \"http://localhost:13337/?folder=/home/coder\"\n  icon         = \"/icon/code.svg\"\n  subdomain    = false\n  share        = \"owner\"\n}"
  - name: template-nodejs
