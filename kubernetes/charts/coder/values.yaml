      template.tf: "terraform {\n  required_providers {\n    coder = {\n      source = \"coder/coder\"\n    }\n    kubernetes = {\n      source = \"hashicorp/kubernetes\"\n    }\n  }\n}\n\nprovider \"coder\" {}\n\nprovider \"kubernetes\" {\n  config_path = null\n}\n\ndata \"coder_workspace\" \"me\" {}\n\nresource \"coder_agent\" \"main\" {\n  arch = \"amd64\"\n  os   = \"linux\"\n  \n  startup_script = <<-EOT\n    #!/bin/bash\n    set -e\n    \n    # Install common tools\n    sudo apt-get update\n    sudo apt-get install -y git curl wget vim nano htop\n    \n    # Configure git if credentials available\n    if [ ! -z \"$GIT_AUTHOR_NAME\" ]; then\n      git config --global user.name \"$GIT_AUTHOR_NAME\"\n      git config --global user.email \"$GIT_AUTHOR_EMAIL\"\n    fi\n    \n    # Clone repository if specified\n    if [ ! -z \"$GIT_CLONE_URL\" ]; then\n      cd ~/workspace\n      git clone \"$GIT_CLONE_URL\" project || true\n      cd project\n    fi\n    \n    # Install project dependencies\n    if [ -f package.json ]; then\n      bun install || npm install || yarn install\n    fi\n  EOT\n\n  metadata {\n    display_name = \"Node.js Version\"\n    key          = \"node_version\"\n    script       = \"node --version\"\n    interval     = 0\n    timeout      = 1\n  }\n\n  metadata {\n    display_name = \"Bun Version\"\n    key          = \"bun_version\"\n    script       = \"bun --version\"\n    interval     = 0\n    timeout      = 1\n  }\n\n  metadata {\n    display_name = \"CPU Usage\"\n    key          = \"cpu_usage\"\n    script       = \"top -bn1 | grep 'Cpu(s)' | awk '{print $2}'\"\n    interval     = 10\n    timeout      = 1\n  }\n\n  metadata {\n    display_name = \"Memory Usage\"\n    key          = \"mem_usage\"\n    script       = \"free -h | awk '/^Mem:/ {print $3 \\\"/\\\" $2}'\"\n    interval     = 10\n    timeout      = 1\n  }\n}\n\nresource \"kubernetes_pod\" \"main\" {\n  count = data.coder_workspace.me.start_count\n  \n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}\"\n    namespace = \"default\"\n    labels = {\n      \"app.kubernetes.io/name\"     = \"coder-workspace\"\n      \"app.kubernetes.io/instance\" = data.coder_workspace.me.name\n      \"app.kubernetes.io/owner\"    = data.coder_workspace.me.owner\n      \"coder.workspace\"            = \"true\"\n    }\n  }\n\n  spec {\n    security_context {\n      run_as_user = 1000\n      fs_group    = 1000\n    }\n\n    container {\n      name  = \"dev\"\n      image = \"codercom/enterprise-node:ubuntu\"\n      \n      command = [\"/bin/bash\", \"-c\", coder_agent.main.init_script]\n      \n      security_context {\n        run_as_user = 1000\n      }\n\n      env {\n        name  = \"CODER_AGENT_TOKEN\"\n        value = coder_agent.main.token\n      }\n\n      resources {\n        requests = {\n          cpu    = \"500m\"\n          memory = \"1Gi\"\n        }\n        limits = {\n          cpu    = \"2\"\n          memory = \"4Gi\"\n        }\n      }\n\n      volume_mount {\n        mount_path = \"/home/coder\"\n        name       = \"home\"\n      }\n    }\n\n    volume {\n      name = \"home\"\n      persistent_volume_claim {\n        claim_name = kubernetes_persistent_volume_claim.home.metadata[0].name\n      }\n    }\n  }\n}\n\nresource \"kubernetes_persistent_volume_claim\" \"home\" {\n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}-home\"\n    namespace = \"default\"\n  }\n\n  wait_until_bound = false\n\n  spec {\n    access_modes = [\"ReadWriteOnce\"]\n    storage_class_name = \"local-path\"\n    \n    resources {\n      requests = {\n        storage = \"50Gi\"\n      }\n    }\n  }\n}\n\nresource \"coder_app\" \"code-server\" {\n  agent_id     = coder_agent.main.id\n  slug         = \"code-server\"\n  display_name = \"VS Code\"\n  url          = \"http://localhost:13337/?folder=/home/coder\"\n  icon         = \"/icon/code.svg\"\n  subdomain    = false\n  share        = \"owner\"\n\n  healthcheck {\n    url       = \"http://localhost:13337/healthz\"\n    interval  = 5\n    threshold = 6\n  }\n}\n\nresource \"coder_app\" \"terminal\" {\n  agent_id     = coder_agent.main.id\n  slug         = \"terminal\"\n  display_name = \"Terminal\"\n  url          = \"http://localhost:7681\"\n  icon         = \"/icon/terminal.svg\"\n  subdomain    = false\n  share        = \"owner\"\n}"
  - name: template-python
    data:
      template.tf: "terraform {\n  required_providers {\n    coder = {\n      source = \"coder/coder\"\n    }\n    kubernetes = {\n      source = \"hashicorp/kubernetes\"\n    }\n  }\n}\n\nprovider \"coder\" {}\nprovider \"kubernetes\" {\n  config_path = null\n}\n\ndata \"coder_workspace\" \"me\" {}\n\nresource \"coder_agent\" \"main\" {\n  arch = \"amd64\"\n  os   = \"linux\"\n  \n  startup_script = <<-EOT\n    #!/bin/bash\n    set -e\n    \n    # Install common tools\n    sudo apt-get update\n    sudo apt-get install -y git curl wget vim nano htop build-essential\n    \n    # Configure git\n    if [ ! -z \"$GIT_AUTHOR_NAME\" ]; then\n      git config --global user.name \"$GIT_AUTHOR_NAME\"\n      git config --global user.email \"$GIT_AUTHOR_EMAIL\"\n    fi\n    \n    # Clone repository if specified\n    if [ ! -z \"$GIT_CLONE_URL\" ]; then\n      cd ~/workspace\n      git clone \"$GIT_CLONE_URL\" project || true\n      cd project\n    fi\n    \n    # Setup Python virtual environment\n    if [ -f requirements.txt ]; then\n      python3 -m venv venv\n      source venv/bin/activate\n      pip install -r requirements.txt\n    elif [ -f pyproject.toml ]; then\n      poetry install || pip install poetry && poetry install\n    fi\n  EOT\n\n  metadata {\n    display_name = \"Python Version\"\n    key          = \"python_version\"\n    script       = \"python3 --version\"\n    interval     = 0\n    timeout      = 1\n  }\n\n  metadata {\n    display_name = \"Poetry Version\"\n    key          = \"poetry_version\"\n    script       = \"poetry --version 2>/dev/null || echo 'Not installed'\"\n    interval     = 0\n    timeout      = 1\n  }\n}\n\nresource \"kubernetes_pod\" \"main\" {\n  count = data.coder_workspace.me.start_count\n  \n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}\"\n    namespace = \"default\"\n    labels = {\n      \"app.kubernetes.io/name\"     = \"coder-workspace\"\n      \"app.kubernetes.io/instance\" = data.coder_workspace.me.name\n      \"app.kubernetes.io/owner\"    = data.coder_workspace.me.owner\n      \"coder.workspace\"            = \"true\"\n      \"coder.template\"             = \"python\"\n    }\n  }\n\n  spec {\n    security_context {\n      run_as_user = 1000\n      fs_group    = 1000\n    }\n\n    container {\n      name  = \"dev\"\n      image = \"codercom/enterprise-python:ubuntu\"\n      \n      command = [\"/bin/bash\", \"-c\", coder_agent.main.init_script]\n      \n      security_context {\n        run_as_user = 1000\n      }\n\n      env {\n        name  = \"CODER_AGENT_TOKEN\"\n        value = coder_agent.main.token\n      }\n\n      resources {\n        requests = {\n          cpu    = \"500m\"\n          memory = \"1Gi\"\n        }\n        limits = {\n          cpu    = \"2\"\n          memory = \"4Gi\"\n        }\n      }\n\n      volume_mount {\n        mount_path = \"/home/coder\"\n        name       = \"home\"\n      }\n    }\n\n    volume {\n      name = \"home\"\n      persistent_volume_claim {\n        claim_name = kubernetes_persistent_volume_claim.home.metadata[0].name\n      }\n    }\n  }\n}\n\nresource \"kubernetes_persistent_volume_claim\" \"home\" {\n  metadata {\n    name      = \"coder-${lower(data.coder_workspace.me.owner)}-${lower(data.coder_workspace.me.name)}-home\"\n    namespace = \"default\"\n  }\n  wait_until_bound = false\n  spec {\n    access_modes = [\"ReadWriteOnce\"]\n    storage_class_name = \"local-path\"\n    resources {\n      requests = {\n        storage = \"50Gi\"\n      }\n    }\n  }\n}\n\nresource \"coder_app\" \"code-server\" {\n  agent_id     = coder_agent.main.id\n  slug         = \"code-server\"\n  display_name = \"VS Code\"\n  url          = \"http://localhost:13337/?folder=/home/coder\"\n  icon         = \"/icon/code.svg\"\n  subdomain    = false\n  share        = \"owner\"\n}"
  extraManifests:
  - "apiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: coder-config\n  namespace: {{ .Release.Namespace }}\n  labels:\n    helm.sh/chart: coder-0.1.0\n    app.kubernetes.io/name: coder\n    app.kubernetes.io/instance: coder\n    app.kubernetes.io/version: \"2.17.0\"\n    app.kubernetes.io/managed-by: Helm\ndata:\n  # Coder server configuration\n  CODER_HTTP_ADDRESS: \"0.0.0.0:3000\"\n  CODER_ACCESS_URL: \"https://coder.localhost\"\n  CODER_WILDCARD_ACCESS_URL: \"*.workspace.coder.localhost\"\n  CODER_TELEMETRY: \"false\"\n  CODER_PROMETHEUS_ENABLE: \"true\"\n  CODER_PROMETHEUS_ADDRESS: \"0.0.0.0:2112\"\n  CODER_PROVISIONER_DAEMONS: \"3\"\n  CODER_MAX_TOKEN_LIFETIME: \"168h\"\n  CODER_SESSION_DURATION: \"24h\"\n  CODER_BROWSER_ONLY: \"false\"\n  \n  # Workspace defaults\n  CODER_WORKSPACE_INACTIVITY_TIMEOUT: \"4h\"\n  CODER_WORKSPACE_TTL: \"168h\"\n"
  - |
    ---
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: coder
      labels:
        helm.sh/chart: coder-0.1.0
        app.kubernetes.io/name: coder
        app.kubernetes.io/instance: coder
        app.kubernetes.io/version: "2.17.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      podSelector:
        matchLabels:
          app.kubernetes.io/name: coder
          app.kubernetes.io/instance: coder
      policyTypes:
        - Ingress
        - Egress

      ingress:
        # Allow ingress from Traefik
        - from:
            - namespaceSelector:
                matchLabels:
                  name: ingress
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: traefik
          ports:
            - protocol: TCP
              port: 3000

        # Allow ingress from same namespace
        - from:
            - podSelector: {}

      egress:
        # Allow DNS
        - to:
            - namespaceSelector:
              matchLabels:
                name: kube-system
          ports:
            - protocol: UDP
              port: 53

        # Allow HTTPS to external
        - to:
            - namespaceSelector: {}
          ports:
            - protocol: TCP
              port: 443

        # Allow HTTP to external
        - to:
            - namespaceSelector: {}
          ports:
            - protocol: TCP
              port: 80

        # Allow database connections
        - to:
            - namespaceSelector:
                matchLabels:
                  name: db
          ports:
            - protocol: TCP
              port: 5432  # PostgreSQL
            - protocol: TCP
              port: 27017  # MongoDB
            - protocol: TCP
              port: 6379  # Valkey/Redis
            - protocol: TCP
              port: 9000  # MinIO
            - protocol: TCP
              port: 8123  # ClickHouse
            - protocol: TCP
              port: 3306  # MySQL
            - protocol: TCP
              port: 5672  # RabbitMQ

        # Allow service mesh (Consul)
        - to:
            - namespaceSelector:
                matchLabels:
                  name: service
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: consul
          ports:
            - protocol: TCP
              port: 8500
            - protocol: TCP
              port: 8600

        # Allow Vault
        - to:
            - namespaceSelector:
                matchLabels:
                  name: service
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: vault
          ports:
            - protocol: TCP
              port: 8200

        # Allow Authentik
        - to:
            - namespaceSelector:
                matchLabels:
                  name: service
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: authentik
          ports:
            - protocol: TCP
              port: 9000
            - protocol: TCP
              port: 9443
  - |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: coder
      namespace: {{ .Release.Namespace }}
      labels:
        helm.sh/chart: coder-0.1.0
        app.kubernetes.io/name: coder
        app.kubernetes.io/instance: coder
        app.kubernetes.io/version: "2.17.0"
        app.kubernetes.io/managed-by: Helm
  - |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: coder
      labels:
        helm.sh/chart: coder-0.1.0
        app.kubernetes.io/name: coder
        app.kubernetes.io/instance: coder
        app.kubernetes.io/version: "2.17.0"
        app.kubernetes.io/managed-by: Helm
    rules:
      # Workspace pod management
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
      - apiGroups: [""]
        resources: ["pods/log"]
        verbs: ["get", "list", "watch"]
      - apiGroups: [""]
        resources: ["pods/exec"]
        verbs: ["create", "get"]
      - apiGroups: [""]
        resources: ["pods/portforward"]
        verbs: ["create", "get"]

      # Workspace service management
      - apiGroups: [""]
        resources: ["services"]
        verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]

      # Workspace storage management
      - apiGroups: [""]
        resources: ["persistentvolumeclaims"]
        verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
      - apiGroups: [""]
        resources: ["persistentvolumes"]
        verbs: ["get", "list", "watch"]

      # ConfigMaps and Secrets for workspace configuration
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
      - apiGroups: [""]
        resources: ["secrets"]
        verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]

      # ServiceAccount management for workspaces
      - apiGroups: [""]
        resources: ["serviceaccounts"]
        verbs: ["create", "get", "list", "watch", "delete"]

      # Namespace management (for workspace isolation)
      - apiGroups: [""]
        resources: ["namespaces"]
        verbs: ["get", "list", "watch"]

      # Events for debugging
      - apiGroups: [""]
        resources: ["events"]
        verbs: ["get", "list", "watch"]

      # Node information (for scheduling)
      - apiGroups: [""]
        resources: ["nodes"]
        verbs: ["get", "list", "watch"]

      # RBAC for workspace service accounts
      - apiGroups: ["rbac.authorization.k8s.io"]
        resources: ["roles", "rolebindings"]
        verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]

      # Apps API for Deployments/StatefulSets
      - apiGroups: ["apps"]
        resources: ["deployments", "statefulsets"]
        verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]

      # Networking for Ingress
      - apiGroups: ["networking.k8s.io"]
        resources: ["ingresses"]
        verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
  - |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: coder
      labels:
        helm.sh/chart: coder-0.1.0
        app.kubernetes.io/name: coder
        app.kubernetes.io/instance: coder
        app.kubernetes.io/version: "2.17.0"
        app.kubernetes.io/managed-by: Helm
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: coder
    subjects:
      - kind: ServiceAccount
        name: coder
        namespace: {{ .Release.Namespace }}
  - |
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: coder
      namespace: {{ .Release.Namespace }}
      labels:
        helm.sh/chart: coder-0.1.0
        app.kubernetes.io/name: coder
        app.kubernetes.io/instance: coder
        app.kubernetes.io/version: "2.17.0"
        app.kubernetes.io/managed-by: Helm
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt"
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    spec:
      ingressClassName: traefik
      tls:
        - hosts:
            - coder.localhost
          secretName: coder-tls
      rules:
        - host: coder.localhost
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: coder
                    port:
                      number: 3000
  - |
    # Wildcard Ingress for workspaces
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: coder-wildcard
      namespace: {{ .Release.Namespace }}
      labels:
        helm.sh/chart: coder-0.1.0
        app.kubernetes.io/name: coder
        app.kubernetes.io/instance: coder
        app.kubernetes.io/version: "2.17.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: wildcard
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt"
        traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    spec:
      ingressClassName: traefik
      tls:
        - hosts:
            - "*.workspace.coder.localhost"
          secretName: coder-workspace-tls
      rules:
        - host: "*.workspace.coder.localhost"
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
