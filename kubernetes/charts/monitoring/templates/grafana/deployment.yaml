{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
spec:
  replicas: {{ .Values.grafana.replicaCount }}
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
      annotations:
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "grafana"
        consul.hashicorp.com/connect-service-port: "3000"
        {{- end }}
        # ELK Filebeat logging
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        # Prometheus metrics
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000
              name: http

          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "https://{{ .Values.ingress.hosts.grafana.host }}/"
            - name: GF_THEME_DEFAULT
              value: {{ .Values.grafana.theme }}
            {{- if .Values.grafana.oidc.enabled }}
            # OIDC/OAuth2 Configuration
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "Authentik"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: oidc-client-id
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: oidc-client-secret
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "openid profile email"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "{{ .Values.grafana.oidc.authUrl }}"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "{{ .Values.grafana.oidc.tokenUrl }}"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "{{ .Values.grafana.oidc.userInfoUrl }}"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN
              value: "false"
            - name: GF_AUTH_SIGNOUT_REDIRECT_URL
              value: "{{ .Values.grafana.oidc.logoutUrl }}"
            {{- end }}

          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}

          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning
            - name: storage
              mountPath: /var/lib/grafana

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-storage
{{- end }}
