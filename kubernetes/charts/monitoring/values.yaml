# Namespace
namespace: service

create:
  namespace: true

# Prometheus config
prometheus:
  enabled: true
  image: prom/prometheus:v3.1.0  # Pinned version - do not use :latest
  replicaCount: 1

  service:
    type: ClusterIP
    port: 9090

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    storageClass: local-path
    size: 3Gi
    mountPath: /prometheus

  # Retention
  retention: 30d
  retentionSize: "25GB"

  # Scrape intervals
  globalScrapeInterval: 30s
  globalEvaluationInterval: 30s

# Loki config
loki:
  enabled: true
  image: grafana/loki:3.3.2  # Pinned version - do not use :latest
  replicaCount: 1

  service:
    type: ClusterIP
    port: 3100

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  persistence:
    enabled: true
    storageClass: local-path
    size: 2Gi
    mountPath: /loki

  # Retention
  retention_period: 720h  # 30 дней
  max_chunk_age: 2h

# Promtail config (Log collector)
promtail:
  enabled: true
  image: grafana/promtail:3.3.2  # Pinned version - do not use :latest

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi

# Grafana config
grafana:
  enabled: true
  image: grafana/grafana:11.4.0  # Pinned version - do not use :latest
  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  persistence:
    enabled: true
    storageClass: local-path
    size: 5Gi
    mountPath: /var/lib/grafana

  # Admin config
  admin:
    user: admin
    password: ""  # Injected via Vault - see vault.hashicorp.com annotations

  # Theme
  theme: dark

  # Plugins
  plugins: []

  # OIDC/OAuth2 Configuration (Authentik)
  oidc:
    enabled: false
    clientId: ""
    clientSecret: ""
    authUrl: "https://auth.example.com/application/o/authorize/"
    tokenUrl: "https://auth.example.com/application/o/token/"
    userInfoUrl: "https://auth.example.com/application/o/userinfo/"
    logoutUrl: "https://auth.example.com/application/o/grafana/end-session/"

# Ingress config
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure

  hosts:
    prometheus:
      host: prometheus.local
      path: /
    loki:
      host: loki.local
      path: /
    grafana:
      host: grafana.local
      path: /

  tls:
    enabled: true
    secretName: monitoring-tls

# Consul integration
consul:
  enabled: true
  host: "consul.consul.svc.cluster.local"
  port: 8500
  datacenter: dc1

# Pod Anti-affinity for multi-node deployment
affinity:
  podAntiAffinity:
    enabled: false
    type: preferredDuringSchedulingIgnoredDuringExecution

# Security
securityContext:
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

# Authentik integration (ForwardAuth via Traefik)
authentik:
  enabled: false
  middleware: "service-authentik-forward-auth@kubernetescrd"
  host: "https://authentik.local"
  outpostPath: "/outpost.goauthentik.io/auth/traefik"


# Network Policy
networkPolicy:
  enabled: true
  egressRules:
    allowDatabases: false
    allowConsul: true
    allowVault: true
    allowAuthentik: false
  ingress: []
  egress: []

# Service Account
serviceAccount:
  create: true
  automountServiceAccountToken: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true
  allowSecrets: false
  rules: []

# Metrics
metrics:
  enabled: true
  port: "metrics"
  path: "/metrics"
  interval: "30s"
  scrapeTimeout: "10s"

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
