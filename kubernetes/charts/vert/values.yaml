# vert — rendered entirely by the chart-base subchart.
# VERT is an nginx-served file converter listening on container port 80, exposed
# via a ClusterIP Service on port 3000. readOnlyRootFilesystem (baked into
# chart-base) is satisfied by emptyDir mounts for nginx cache/run/tmp.
chart-base:
  workloads:
    - kind: Deployment
      replicas: 1
      podAnnotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: vert
        consul.hashicorp.com/connect-service-port: "80"
        consul.hashicorp.com/service-tags: "utilities,vert,converter"
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
      containers:
        - name: vert
          image: ghcr.io/vert-sh/vert:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 80 }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 300m, memory: 256Mi }
          volumeMounts:
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: run, mountPath: /var/run }
            - { name: tmp, mountPath: /tmp }
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - { name: cache, emptyDir: {} }
        - { name: run, emptyDir: {} }
        - { name: tmp, emptyDir: {} }

  services:
    - ports:
        - { name: http, port: 3000, targetPort: http, protocol: TCP }

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    rules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [configmaps], verbs: [get, list] }

  networkPolicy:
    enabled: true
    allowDB: false

  serviceMonitor:
    enabled: true
    port: http
    path: /metrics

  pdb:
    enabled: false

  routing:
    httpRoutes:
      - host: vert.localhost
        port: 3000
        authentik:
          enabled: false

  tests:
    enabled: true
    port: 3000
