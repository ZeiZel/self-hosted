# rybbit — rendered entirely by the chart-base subchart.
# Rybbit analytics: a backend Deployment (with wait-for-clickhouse/postgres init
# containers) + a client Deployment (two workloads), each with its own Service and
# HTTPRoute. Uses the external shared PostgreSQL/ClickHouse in the db namespace.
# Image tags are kept as "latest" to match the original chart exactly.
chart-base:
  workloads:
    # --- Backend / API (Deployment) ---
    - name: backend
      kind: Deployment
      replicas: 1
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: backend
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-clickhouse
          image: busybox:1.38.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for ClickHouse to be ready..."
              CLICKHOUSE_HOST="${CLICKHOUSE_HOST:-clickhouse.db.svc.cluster.local}"
              until wget -q --spider http://${CLICKHOUSE_HOST}:8123/ping; do
                echo "ClickHouse is not ready yet..."
                sleep 2
              done
              echo "ClickHouse is ready!"
          env:
            - { name: CLICKHOUSE_HOST, value: "clickhouse.db.svc.cluster.local" }
        - name: wait-for-postgres
          image: postgres:18-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              POSTGRES_HOST="${POSTGRES_HOST:-postgresql.db.svc.cluster.local}"
              POSTGRES_PORT="${POSTGRES_PORT:-5432}"
              until pg_isready -h ${POSTGRES_HOST} -p ${POSTGRES_PORT}; do
                echo "PostgreSQL is not ready yet..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          env:
            - { name: POSTGRES_HOST, value: "postgresql.db.svc.cluster.local" }
            - { name: POSTGRES_PORT, value: "5432" }
      containers:
        - name: backend
          image: ghcr.io/rybbit-io/rybbit-backend:v2.6.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          resources:
            limits: { cpu: 1000m, memory: 2Gi }
            requests: { cpu: 10m, memory: 128Mi }
          env:
            - { name: NODE_ENV, value: "production" }
            - { name: DISABLE_SIGNUP, value: "true" }
            - { name: CLICKHOUSE_DB, value: "default" }
            - { name: POSTGRES_PORT, value: "5432" }
            - { name: CLICKHOUSE_HOST, value: "http://clickhouse.db.svc.cluster.local:8123" }
            - { name: CLICKHOUSE_USER, value: "default" }
            - { name: POSTGRES_HOST, value: "postgresql.db.svc.cluster.local" }
            - { name: POSTGRES_DB, value: "analytics" }
            - { name: POSTGRES_USER, value: "postgres" }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: admin-password
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: rybbit-secrets
                  key: better-auth-secret
          ports:
            - { name: http, containerPort: 3000, protocol: TCP }
    # --- Client / Web UI (Deployment) ---
    - name: client
      kind: Deployment
      replicas: 1
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: client
                topologyKey: kubernetes.io/hostname
      containers:
        - name: client
          image: ghcr.io/rybbit-io/rybbit-client:v2.6.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          resources:
            limits: { cpu: 1000m, memory: 2Gi }
            requests: { cpu: 100m, memory: 128Mi }
          env:
            - { name: NODE_ENV, value: "production" }
            - { name: NEXT_PUBLIC_BACKEND_URL, value: "" }
            - { name: NEXT_PUBLIC_API_URL, value: "http://rybbit-backend.{{ .Release.Namespace }}.svc.cluster.local:3000" }
          ports:
            - { name: http, containerPort: 3000, protocol: TCP }

  services:
    - name: backend
      component: backend
      type: ClusterIP
      ports:
        - { name: http, port: 3000, targetPort: 3001, protocol: TCP }
    - name: client
      component: client
      type: ClusterIP
      ports:
        - { name: http, port: 3000, targetPort: 3002, protocol: TCP }

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    rules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [configmaps], verbs: [get, list] }

  networkPolicy:
    enabled: true
    allowDB: true
    extraIngress:
      - from:
          - podSelector: {}
    extraEgress:
      - to:
          - namespaceSelector: {}
        ports:
          - { protocol: TCP, port: 443 }
      - to:
          - namespaceSelector: {}
        ports:
          - { protocol: TCP, port: 80 }
      - to:
          - namespaceSelector:
              matchLabels:
                name: service
            podSelector:
              matchLabels:
                app.kubernetes.io/name: consul
        ports:
          - { protocol: TCP, port: 8500 }
          - { protocol: TCP, port: 8600 }
      - to:
          - namespaceSelector:
              matchLabels:
                name: service
            podSelector:
              matchLabels:
                app.kubernetes.io/name: vault
        ports:
          - { protocol: TCP, port: 8200 }

  serviceMonitor:
    enabled: true
    port: metrics
    path: /metrics
    interval: 30s

  routing:
    httpRoutes:
      - name: api
        host: rybbit-api.localhost
        port: 3000
        service: rybbit-backend
        authentik:
          enabled: false
      - name: client
        host: rybbit.localhost
        port: 3000
        service: rybbit-client
        authentik:
          enabled: false

  tests:
    enabled: true
    url: "http://rybbit-backend:3000"
