# metube — rendered entirely by the chart-base subchart.
# MeTube: YouTube downloader web UI. Downloads persist to a PVC mounted at /downloads.
chart-base:
  workloads:
    - kind: Deployment
      replicas: 1
      podAnnotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: metube
        consul.hashicorp.com/connect-service-port: "8081"
        consul.hashicorp.com/service-tags: "utilities,metube,downloader"
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
      containers:
        - name: metube
          image: ghcr.io/alexta69/metube:2026.06.28
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8081 }
          env:
            - { name: OUTPUT_TEMPLATE, value: "%(title)s.%(ext)s" }
            - { name: DEFAULT_RES, value: "1080" }
            - { name: DARK_MODE, value: "true" }
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          volumeMounts:
            - { name: downloads, mountPath: /downloads }
          livenessProbe:
            httpGet: { path: /, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 8081 }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: downloads
          persistentVolumeClaim:
            claimName: metube-downloads

  services:
    - ports:
        - { name: http, port: 8081, targetPort: 8081, protocol: TCP }

  pvcs:
    - { name: downloads, accessModes: [ReadWriteOnce], storageClass: local-path, size: 10Gi }

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    rules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [configmaps], verbs: [get, list] }

  networkPolicy:
    enabled: true
    allowDB: false

  serviceMonitor:
    enabled: true
    port: http
    path: /metrics
    interval: 30s

  pdb:
    enabled: false

  routing:
    httpRoutes:
      - host: metube.localhost
        port: 8081
        authentik:
          enabled: false

  tests:
    enabled: true
    port: 8081
