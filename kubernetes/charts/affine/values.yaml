# affine — rendered entirely by the chart-base subchart.
# Non-secret config is inlined as container env (the original ConfigMap was
# consumed via envFrom, not mounted as a file). Secret env vars live in the
# `secret` Secret (rendered as affine-secret) and are pulled via envFrom.
# Override credentials per-environment in releases/affine.yaml.gotmpl.
chart-base:
  # affine keeps a writable root filesystem (original readOnlyRootFilesystem: false).
  securityContext:
    readOnlyRootFilesystem: false

  workloads:
    - kind: Deployment
      replicas: 1
      podAnnotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "affine"
        consul.hashicorp.com/connect-service-port: "3010"
        consul.hashicorp.com/service-tags: "affine"
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        co.elastic.logs.json.message_key: "message"
        prometheus.io/scrape: "true"
        prometheus.io/port: "3010"
        prometheus.io/path: "/metrics"
      containers:
        - name: affine
          image: ghcr.io/toeverything/affine:stable
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3010, protocol: TCP }
          env:
            - { name: AFFINE_SERVER_HOST, value: "0.0.0.0" }
            - { name: AFFINE_SERVER_PORT, value: "3010" }
            - { name: AFFINE_SERVER_HTTPS, value: "false" }
            - { name: NODE_ENV, value: "production" }
            - { name: NODE_OPTIONS, value: "--max-old-space-size=4096" }
            - { name: SERVER_NAME, value: "AFFiNE" }
            - { name: AFFINE_SERVER_EXTERNAL_URL, value: "http://affine.local" }
            - { name: AFFINE_EARLY_ACCESS_PREVIEW, value: "false" }
            - { name: ENABLE_SIGNUP, value: "true" }
            - { name: ENABLE_PASSWORD_SIGNIN, value: "true" }
            - { name: STORAGE_PROVIDER, value: "s3" }
            - { name: REDIS_SERVER_HOST, value: "valkey-primary.db.svc.cluster.local" }
            - { name: REDIS_SERVER_PORT, value: "6379" }
            - { name: AFFINE_S3_ENDPOINT, value: "http://minio.db.svc.cluster.local:9000" }
            - { name: AFFINE_S3_BUCKET, value: "affine" }
            - { name: AFFINE_S3_REGION, value: "us-east-1" }
            - { name: AFFINE_S3_FORCE_PATH_STYLE, value: "true" }
          envFrom:
            - secretRef:
                name: affine-secret
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: 2000m, memory: 4Gi }
          volumeMounts:
            - { name: storage, mountPath: /root/.affine/storage }
            - { name: app-src, mountPath: /app/src }
            - { name: tmp, mountPath: /tmp }
          livenessProbe:
            httpGet: { path: /api/healthz, port: 3010 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /api/healthz, port: 3010 }
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: affine-storage
        - name: app-src
          emptyDir: {}
        - name: tmp
          emptyDir: {}

  services:
    - ports:
        - { name: http, port: 3010, targetPort: http, protocol: TCP }

  secrets:
    - name: secret
      type: Opaque
      stringData:
        POSTGRES_HOST: "postgresql.db.svc.cluster.local"
        POSTGRES_PORT: "5432"
        POSTGRES_USER: "affine"
        POSTGRES_PASSWORD: ""
        POSTGRES_DB: "affine"
        DATABASE_URL: "postgresql://affine:@postgresql.db.svc.cluster.local:5432/affine"
        REDIS_HOST: "valkey-primary.db.svc.cluster.local"
        REDIS_PORT: "6379"
        REDIS_DB: "0"
        S3_ENDPOINT: "http://minio.db.svc.cluster.local:9000"
        S3_REGION: "us-east-1"
        S3_BUCKET: "affine"
        S3_ACCESS_KEY: "minioadmin"
        S3_SECRET_KEY: "minioadmin"
        S3_FORCE_PATH_STYLE: "true"

  pvcs:
    - { name: storage, accessModes: [ReadWriteOnce], storageClass: local-path, size: 10Gi }

  serviceAccount:
    create: true
    automount: false

  rbac:
    create: true
    rules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [configmaps], verbs: [get, list] }

  networkPolicy:
    enabled: true
    allowDB: true

  serviceMonitor:
    enabled: true
    port: http
    path: /metrics

  pdb:
    enabled: false
    minAvailable: 1

  routing:
    httpRoutes:
      - host: affine.local
        port: 3010
        authentik:
          enabled: false

  tests:
    enabled: true
    port: 3010
