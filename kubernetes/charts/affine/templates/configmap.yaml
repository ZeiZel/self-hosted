apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "affine.fullname" . }}
  labels:
    {{- include "affine.labels" . | nindent 4 }}
data:
  AFFINE_SERVER_HOST: {{ .Values.affine.host | quote }}
  AFFINE_SERVER_PORT: {{ .Values.affine.port | quote }}
  AFFINE_SERVER_HTTPS: {{ .Values.affine.https | quote }}
  
  NODE_ENV: "production"
  NODE_OPTIONS: "--max-old-space-size=4096"
  
  # Server configuration
  SERVER_NAME: {{ .Values.affine.serverName | quote }}
  AFFINE_SERVER_EXTERNAL_URL: {{ .Values.affine.server.externalUrl | quote }}
  
  # Feature flags
  AFFINE_EARLY_ACCESS_PREVIEW: {{ .Values.affine.features.earlyAccess | quote }}
  
  # Authentication
  ENABLE_SIGNUP: {{ .Values.affine.auth.enableSignup | quote }}
  ENABLE_PASSWORD_SIGNIN: {{ .Values.affine.auth.enablePassword | quote }}
  
  # Storage
  STORAGE_PROVIDER: "s3"

  # PostgreSQL
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: "postgres://{{ .Values.postgresql.external.username }}:{{ .Values.postgresql.external.password }}@{{ .Values.postgresql.external.host }}:{{ .Values.postgresql.external.port }}/{{ .Values.postgresql.external.database }}"
  {{- end }}

  # Redis
  {{- if .Values.redis.enabled }}
  REDIS_SERVER_HOST: {{ .Values.redis.external.host | quote }}
  REDIS_SERVER_PORT: {{ .Values.redis.external.port | quote }}
  {{- if .Values.redis.external.password }}
  REDIS_SERVER_PASSWORD: {{ .Values.redis.external.password | quote }}
  {{- end }}
  {{- end }}

  # S3/MinIO
  {{- if .Values.s3.enabled }}
  AFFINE_S3_ENDPOINT: {{ .Values.s3.endpoint | quote }}
  AFFINE_S3_BUCKET: {{ .Values.s3.bucket | quote }}
  AFFINE_S3_REGION: {{ .Values.s3.region | quote }}
  AFFINE_S3_FORCE_PATH_STYLE: {{ .Values.s3.forcePathStyle | quote }}
  {{- end }}
