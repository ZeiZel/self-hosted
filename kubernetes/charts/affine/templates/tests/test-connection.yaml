apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "affine.fullname" . }}-test-connection"
  labels:
    {{- include "affine.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['curl']
      args: ['-sf', 'http://{{ include "affine.fullname" . }}:{{ .Values.service.port }}/api/healthz']
