# bytebase — rendered entirely by the chart-base subchart.
# Bytebase: database schema change and version control.
chart-base:
  # Bytebase writes to /var/opt/bytebase (a PVC) and to its own runtime paths,
  # so the read-only root filesystem baked in by chart-base is relaxed here.
  podSecurityContext:
    runAsGroup: 1000
  securityContext:
    readOnlyRootFilesystem: false

  workloads:
    - kind: Deployment
      replicas: 1
      podAnnotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: bytebase
        consul.hashicorp.com/connect-service-port: "8080"
        consul.hashicorp.com/service-tags: "bytebase,database"
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        co.elastic.logs.json.message_key: "message"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      containers:
        - name: bytebase
          image: bytebase/bytebase:3.20.0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: BYTEBASE_DATA_DIR, value: "/var/opt/bytebase" }
            - { name: BYTEBASE_PORT, value: "8080" }
            - { name: BYTEBASE_MODE, value: "prod" }
            - { name: BYTEBASE_DEMO, value: "false" }
            - { name: BYTEBASE_PG_HOST, value: "postgres-0.postgres-headless.db.svc.cluster.local" }
            - { name: BYTEBASE_PG_PORT, value: "5432" }
            - { name: BYTEBASE_PG_DATABASE, value: "bytebase" }
            - { name: BYTEBASE_PG_USER, value: "bytebase" }
            - name: BYTEBASE_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bytebase-secrets
                  key: postgres-password
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: 1000m, memory: 2Gi }
          volumeMounts:
            - { name: data, mountPath: /var/opt/bytebase }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bytebase-data

  services:
    - annotations:
        consul.hashicorp.com/service-name: bytebase
        consul.hashicorp.com/service-port: "8080"
        consul.hashicorp.com/service-tags: "bytebase,database"
      ports:
        - { name: http, port: 8080, targetPort: 8080, protocol: TCP }

  secrets:
    - name: secrets
      stringData:
        postgres-password: changeme

  pvcs:
    - { name: data, accessModes: [ReadWriteOnce], storageClass: local-path, size: 10Gi }

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    rules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [configmaps], verbs: [get, list] }

  networkPolicy:
    enabled: true
    allowDB: true

  serviceMonitor:
    enabled: true
    port: http
    path: /metrics

  pdb:
    enabled: false

  routing:
    httpRoutes:
      - host: bytebase.localhost
        port: 8080
        authentik:
          enabled: false
          middleware: authentik-forward-auth

  tests:
    enabled: true
    port: 8080
