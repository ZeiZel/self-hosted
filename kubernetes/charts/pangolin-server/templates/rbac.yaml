{{- if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pangolin-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pangolin-server.labels" . | nindent 4 }}
rules:
  # Minimal pod read permissions
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # ConfigMap permissions
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Secret permissions for TLS certificates
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Services for endpoint discovery
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  {{- with .Values.rbac.rules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pangolin-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pangolin-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pangolin-server.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pangolin-server.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
