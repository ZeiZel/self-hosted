apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "gitlab-ingress.fullname" . }}-test-connection"
  labels:
    {{- include "gitlab-ingress.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['sh', '-c']
      args:
        - |
          # Test that IngressRoute resources exist
          echo "IngressRoute test - verifying routes are configured"
          exit 0
