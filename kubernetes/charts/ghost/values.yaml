# ghost — rendered entirely by the chart-base subchart.
# Ghost (TryGhost) publishing platform. Connects to external MySQL in the db
# namespace and stores content (themes/images) on a PVC. Ghost writes to its
# content dir at runtime, so the container filesystem must stay writable
# (readOnlyRootFilesystem: false override below).
chart-base:
  # Ghost writes to its working dir; relax the baked-in read-only rootfs.
  securityContext:
    readOnlyRootFilesystem: false
  podSecurityContext:
    runAsGroup: 1000

  workloads:
    - kind: Deployment
      replicas: 1
      strategy:
        type: Recreate
      podAnnotations:
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        co.elastic.logs.json.message_key: "message"
        prometheus.io/scrape: "true"
        prometheus.io/port: "2368"
        prometheus.io/path: "/metrics"
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "ghost"
        consul.hashicorp.com/connect-service-port: "2368"
        consul.hashicorp.com/service-tags: "ghost,blog,cms,content"
      containers:
        - name: ghost
          image: ghost:6.49.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 2368, protocol: TCP }
          env:
            - { name: url, value: "https://ghost.localhost" }
            - { name: NODE_ENV, value: "production" }
            - { name: database__client, value: "mysql" }
            - { name: database__connection__host, value: "mysql.db.svc.cluster.local" }
            - { name: database__connection__port, value: "3306" }
            - { name: database__connection__database, value: "ghost" }
            - name: database__connection__user
              valueFrom:
                secretKeyRef:
                  name: ghost-secrets
                  key: mysql-user
            - name: database__connection__password
              valueFrom:
                secretKeyRef:
                  name: ghost-secrets
                  key: mysql-password
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /, port: http, scheme: HTTP }
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet: { path: /, port: http, scheme: HTTP }
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - { name: content, mountPath: /var/lib/ghost/content }
      volumes:
        - name: content
          persistentVolumeClaim:
            claimName: ghost-pvc

  services:
    - type: ClusterIP
      ports:
        - { name: http, port: 2368, targetPort: http, protocol: TCP }

  secrets:
    - name: secrets
      stringData:
        mysql-user: "ghost"
        mysql-password: ""

  pvcs:
    - { name: pvc, accessModes: [ReadWriteOnce], storageClass: local-path, size: 10Gi }

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    rules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [configmaps], verbs: [get, list] }

  networkPolicy:
    enabled: true
    allowDB: true

  serviceMonitor:
    enabled: true
    port: http
    path: /metrics

  pdb:
    enabled: false

  routing:
    httpRoutes:
      - host: ghost.localhost
        port: 2368
        authentik:
          enabled: false

  tests:
    enabled: true
    port: 2368
