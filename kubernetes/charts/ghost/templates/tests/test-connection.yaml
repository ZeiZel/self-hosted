apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ghost.fullname" . }}-test-connection"
  labels:
    {{- include "ghost.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['curl']
      args: ['-sf', 'http://{{ include "ghost.fullname" . }}:{{ .Values.service.port }}/ghost/api/admin/site/']
