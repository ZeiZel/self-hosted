apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "consul.fullname" . }}-test-connection"
  labels:
    {{- include "consul.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['sh', '-c']
      args: ['curl -sf http://{{ include "consul.fullname" . }}:8500/v1/status/leader | grep -q ":"']
