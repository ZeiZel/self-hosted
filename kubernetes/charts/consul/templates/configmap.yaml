apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "consul.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "consul.labels" . | nindent 4 }}
data:
  consul.hcl: |
    datacenter = "dc1"
    data_dir = "/consul/data"
    log_level = "INFO"

    server = true
    bootstrap_expect = {{ .Values.server.replicas }}

    ui_config {
      enabled = {{ .Values.ui.enabled }}
    }

    bind_addr = "0.0.0.0"
    client_addr = "0.0.0.0"

    ports {
      http = 8500
      grpc = 8502
      dns = 8600
    }

    connect {
      enabled = true
    }

    addresses {
      http = "0.0.0.0"
    }
