namespace: automation

image:
  repository: n8nio/n8n
  tag: "1.70.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 5678

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

persistence:
  enabled: true
  storageClass: local-path
  size: 5Gi

# Database
database:
  type: postgresdb
  host: postgresql.db.svc.cluster.local
  port: 5432
  database: n8n
  user: n8n
  password: ""  # Injected via Vault - see vault.hashicorp.com annotations

# Redis/Valkey for queue
redis:
  enabled: true
  host: valkey-primary.db.svc.cluster.local
  port: 6379

# n8n configuration
config:
  executions:
    mode: queue
  generic:
    timezone: Europe/Moscow

ingress:
  enabled: true
  className: traefik
  host: n8n.zeizel.ru
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

serviceAccount:
  create: true
  name: n8n
  automountServiceAccountToken: false
  annotations: {}

# RBAC
rbac:
  create: true
  rules: []

# Network Policy
networkPolicy:
  enabled: true
  egressRules:
    allowDatabases: true
    allowConsul: true
    allowVault: true
    allowAuthentik: false
  ingress: []
  egress: []

# Metrics
metrics:
  enabled: true
  port: "http"
  path: "/metrics"
  interval: "30s"
  scrapeTimeout: "10s"

# Security Context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Vault integration
vault:
  enabled: false
  # Note: Before enabling, configure Vault:
  # 1. Create policy for n8n service
  # 2. Create secret at secret/data/n8n/secrets
  # 3. Enable Kubernetes auth method in Vault
  # 4. Create role binding ServiceAccount to Vault policy
