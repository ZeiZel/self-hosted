apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "stoat.fullname" . }}-test-connection"
  labels:
    {{- include "stoat.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['sh', '-c']
      args:
        - |
          # Test web frontend
          curl -sf http://{{ include "stoat.fullname" . }}-web:5000 || exit 1
          echo "Web frontend OK"
