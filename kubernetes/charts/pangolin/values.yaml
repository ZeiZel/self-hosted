namespace: infrastructure

create:
  namespace: true

# Newt client image (Pangolin's official client)
image:
  repository: fosrl/newt
  tag: "1.10.0"  # Pinned version - never use latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001

# Client configuration
pangolin:
  # Server endpoint (Pangolin Server on VPS gateway)
  serverEndpoint: "vpn.example.com"
  # Client identification name
  clientName: "k8s-cluster"
  # Client API port
  port: 3001
  # Tunnel mode: 'newt' (recommended) or 'wireguard'
  mode: "newt"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

persistence:
  enabled: true
  storageClass: local-path
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /var/certificates

ingress:
  enabled: false
  className: traefik
  annotations: {}
  host: pangolin-client.local
  tls:
    enabled: true
    secretName: pangolin-client-tls
    clusterIssuer: letsencrypt

consul:
  enabled: true
  tags:
    - pangolin
    - dynamic-routing
    - traefik-provider

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5






# Authentik integration (ForwardAuth via Traefik)
authentik:
  enabled: false
  middleware: "service-authentik-forward-auth@kubernetescrd"
  host: "https://authentik.local"
  outpostPath: "/outpost.goauthentik.io/auth/traefik"


# Network Policy
networkPolicy:
  enabled: true
  egressRules:
    allowDatabases: false
    allowConsul: true
    allowVault: true
    allowAuthentik: false
  ingress: []
  egress: []

# Service Account
serviceAccount:
  create: true
  automountServiceAccountToken: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true
  allowSecrets: false
  rules: []

# Metrics
metrics:
  enabled: true
  port: "metrics"
  path: "/metrics"
  interval: "30s"
  scrapeTimeout: "10s"

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
