# pangolin (pangolin-client) — rendered entirely by the chart-base subchart.
# Names are pinned via fullnameOverride/nameOverride to preserve the original
# "pangolin-pangolin-client" resource names (referenced by Consul annotations).
chart-base:
  fullnameOverride: pangolin-pangolin-client
  nameOverride: pangolin-client

  workloads:
    - kind: Deployment
      replicas: 1
      podAnnotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: pangolin-pangolin-client
        consul.hashicorp.com/connect-service-port: "3001"
        consul.hashicorp.com/service-tags: "pangolin,dynamic-routing,traefik-provider"
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        co.elastic.logs.json.message_key: "message"
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
      containers:
        - name: pangolin-client
          image: "fosrl/pangolin:1.19.4"
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3001 }
          env:
            - { name: PANGOLIN_SERVER_URL, value: "https://yourdomain.com" }
            - { name: PANGOLIN_CLIENT_NAME, value: "k8s-cluster" }
          resources:
            limits: { cpu: 500m, memory: 512Mi }
            requests: { cpu: 100m, memory: 128Mi }
          volumeMounts:
            - { name: certificates, mountPath: /var/certificates }
          livenessProbe:
            httpGet: { path: /api/v1/, port: 3001 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /api/v1/, port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: certificates
          persistentVolumeClaim:
            claimName: pangolin-pangolin-client-pvc

  services:
    - annotations:
        consul.hashicorp.com/service-name: pangolin-pangolin-client
        consul.hashicorp.com/service-port: "3001"
        consul.hashicorp.com/service-tags: "pangolin,dynamic-routing,traefik-provider"
      ports:
        - { name: http, port: 3001, targetPort: 3001, protocol: TCP }

  pvcs:
    - { name: pvc, accessModes: [ReadWriteOnce], storageClass: local-path, size: 1Gi }

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    rules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [configmaps], verbs: [get, list] }

  serviceMonitor:
    enabled: true
    port: metrics
    path: /metrics
    interval: 30s

  pdb:
    enabled: false

  # Ingress was disabled in the original chart (ingress.enabled: false), so no
  # HTTPRoute is emitted. To expose externally, add an httpRoute here, e.g.:
  # routing:
  #   httpRoutes:
  #     - host: pangolin-client.local
  #       port: 3001
  #       authentik: { enabled: false }
  routing:
    httpRoutes: []

  tests:
    enabled: true
    image: busybox:1.38.0
    port: 3001

  # The original NetworkPolicy is highly customized (restricts ingress to the
  # Traefik pod + same namespace; egress to DNS, external HTTP/HTTPS, Consul,
  # Vault) and does not map onto the simple chart-base networkPolicy schema, so
  # it is reproduced verbatim here. chart-base networkPolicy stays disabled.
  networkPolicy:
    enabled: false

  extraManifests:
    - |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: {{ include "chart-base.fullname" . }}
        namespace: {{ .Release.Namespace }}
        labels:
          {{- include "chart-base.labels" . | nindent 6 }}
      spec:
        podSelector:
          matchLabels:
            {{- include "chart-base.selectorLabels" . | nindent 8 }}
        policyTypes:
          - Ingress
          - Egress
        ingress:
          # Allow ingress from Traefik
          - from:
              - namespaceSelector:
                  matchLabels:
                    name: ingress
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: traefik
            ports:
              - protocol: TCP
                port: 3001
          # Allow ingress from same namespace
          - from:
              - podSelector: {}
        egress:
          # Allow DNS
          - to:
              - namespaceSelector: {}
            ports:
              - protocol: UDP
                port: 53
          # Allow HTTPS to external
          - to:
              - namespaceSelector: {}
            ports:
              - protocol: TCP
                port: 443
          # Allow HTTP to external
          - to:
              - namespaceSelector: {}
            ports:
              - protocol: TCP
                port: 80
          # Allow service mesh (Consul)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: service
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: consul
            ports:
              - protocol: TCP
                port: 8500
              - protocol: TCP
                port: 8600
          # Allow Vault
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: service
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: vault
            ports:
              - protocol: TCP
                port: 8200
