apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pangolin.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pangolin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pangolin.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: {{ include "pangolin.fullname" . }}
        consul.hashicorp.com/connect-service-port: "{{ .Values.pangolin.port }}"
        consul.hashicorp.com/service-tags: "{{ join "," .Values.consul.tags }}"
        {{- end }}
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        co.elastic.logs.json.message_key: "message"
        # Prometheus metrics
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.pangolin.port }}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "pangolin.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.securityContext.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.securityContext.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.securityContext.fsGroup | default 1000 }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: newt-client
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Newt needs to write config
            capabilities:
              add:
                - NET_ADMIN  # Required for tunnel creation
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.pangolin.port }}
              name: http
          env:
            - name: NEWT_SERVER_URL
              value: "https://{{ .Values.pangolin.serverEndpoint }}"
            - name: NEWT_CLIENT_ID
              value: "{{ .Values.pangolin.clientName }}"
            - name: NEWT_CONFIG_PATH
              value: "/app/config/config.yml"
          workingDir: /app
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config-file
              mountPath: /app/config/config.yml
              subPath: config.yml
            - name: runtime-config
              mountPath: /app/runtime
            {{- if .Values.persistence.enabled }}
            - name: certificates
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /api/v1/
              port: {{ .Values.pangolin.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /api/v1/
              port: {{ .Values.pangolin.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
      volumes:
        - name: config-file
          configMap:
            name: {{ include "pangolin.fullname" . }}-config
        - name: runtime-config
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: certificates
          persistentVolumeClaim:
            claimName: {{ include "pangolin.fullname" . }}-pvc
        {{- end }}

