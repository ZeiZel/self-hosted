apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "youtrack.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "youtrack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.youtrack.replicaCount }}
  selector:
    matchLabels:
      {{- include "youtrack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "youtrack.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "youtrack"
        consul.hashicorp.com/connect-service-port: "8080"
        consul.hashicorp.com/service-tags: "{{ join "," .Values.consul.tags }}"
        {{- end }}
        {{- if .Values.vault.enabled }}
        # Vault Agent Injector
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "youtrack"
        vault.hashicorp.com/agent-inject-secret-secrets: "secret/data/youtrack/secrets"
        vault.hashicorp.com/agent-inject-template-secrets: |
          {{`{{- with secret "secret/data/youtrack/secrets" -}}`}}
          {{`{{- range $key, $value := .Data.data -}}`}}
          {{`{{ $key }}={{ $value }}`}}
          {{`{{- end -}}`}}
          {{`{{- end }}`}}
        {{- end }}
        # ELK Filebeat logging (Java multiline)
        co.elastic.logs/enabled: "true"
        co.elastic.logs/multiline.pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}"
        co.elastic.logs/multiline.negate: "true"
        co.elastic.logs/multiline.match: "after"
        # Prometheus metrics
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      serviceAccountName: youtrack

      containers:
        - name: youtrack
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8080
              name: http

          env:
            - name: YOUTRACK_BASE_URL
              value: "{{ .Values.youtrack.config.baseUrl }}"
            - name: YOUTRACK_LISTEN_PORT
              value: "{{ .Values.youtrack.config.listenPort }}"
            - name: YOUTRACK_JVM_OPTIONS
              value: "{{ .Values.youtrack.config.jvmOptions }}"

          envFrom:
            - secretRef:
                name: youtrack-secrets
            - configMapRef:
                name: youtrack-config

          resources:
            {{- toYaml .Values.youtrack.resources | nindent 12 }}

          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.data.mountPath }}
            - name: backups
              mountPath: {{ .Values.persistence.backups.mountPath }}
            - name: logs
              mountPath: {{ .Values.persistence.logs.mountPath }}
            - name: conf
              mountPath: /opt/youtrack/conf

          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}

          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}

      # Use kube-dns directly to avoid nodelocaldns issues
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - "10.233.0.10"
        searches:
          - "{{ .Release.Namespace }}.svc.cluster.local"
          - "svc.cluster.local"
          - "cluster.local"
        options:
          - name: ndots
            value: "5"

      initContainers:
        # Wait for Hub - using busybox for better DNS compatibility
        {{- if .Values.hub.enabled }}
        - name: wait-for-hub
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Hub at {{ .Values.hub.host }}:{{ .Values.hub.port }}..."
              until wget -q --spider --timeout=5 http://{{ .Values.hub.host }}:{{ .Values.hub.port }}/ 2>/dev/null; do
                echo "Waiting for Hub..."
                sleep 5
              done
              echo "Hub is ready!"
        {{- end }}

        # Wait for GitLab
        {{- if .Values.gitlab.enabled }}
        - name: wait-for-gitlab
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for GitLab at {{ .Values.gitlab.host }}:{{ .Values.gitlab.port }}..."
              until wget -q --spider --timeout=5 http://{{ .Values.gitlab.host }}:{{ .Values.gitlab.port }}/ 2>/dev/null; do
                echo "Waiting for GitLab..."
                sleep 5
              done
              echo "GitLab is ready!"
        {{- end }}

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: youtrack-data
        - name: backups
          persistentVolumeClaim:
            claimName: youtrack-backups
        - name: logs
          persistentVolumeClaim:
            claimName: youtrack-logs
        - name: conf
          emptyDir: {}
