# vaultwarden — rendered entirely by the chart-base subchart.
# All resources live under the chart-base: key below. Secret values shown here are
# placeholders; in production they are injected via Vault / SOPS overrides.
chart-base:
  # Vaultwarden runs as uid/gid 80; merged with the mandatory non-root context.
  podSecurityContext:
    runAsUser: 80
    runAsGroup: 80
    fsGroup: 80

  workloads:
    - kind: Deployment
      replicas: 1
      podAnnotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "vaultwarden"
        consul.hashicorp.com/connect-service-port: "8080"
        consul.hashicorp.com/service-tags: "vaultwarden,password-manager"
        co.elastic.logs/enabled: "true"
        co.elastic.logs.json.keys_under_root: "true"
        co.elastic.logs.json.add_error_key: "true"
        co.elastic.logs.json.message_key: "message"
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
      initContainers:
        - name: wait-for-postgresql
          image: postgres:18-alpine
          command:
            - sh
            - -c
            - |
              until psql -h postgresql.db.svc.cluster.local -U vaultwarden -d vaultwarden -c "SELECT 1" > /dev/null 2>&1; do
                echo "Waiting for PostgreSQL..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secrets
                  key: DATABASE_URL
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.36.0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 80 }
          envFrom:
            - secretRef:
                name: vaultwarden-secrets
            - configMapRef:
                name: vaultwarden-config
          resources:
            requests: { cpu: 500m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 512Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
          livenessProbe:
            httpGet: { path: /alive, port: 80 }
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /alive, port: 80 }
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data

  services:
    - annotations:
        consul.hashicorp.com/service-name: "vaultwarden"
        consul.hashicorp.com/service-port: "8080"
        consul.hashicorp.com/service-tags: "vaultwarden,password-manager"
      ports:
        - { name: http, port: 8080, targetPort: 80, protocol: TCP }

  pvcs:
    - { name: data, accessModes: [ReadWriteOnce], storageClass: local-path, size: 2Gi }

  secrets:
    - name: secrets
      stringData:
        DATABASE_URL: "postgresql://vaultwarden:@postgresql.db.svc.cluster.local:5432/vaultwarden"
        ADMIN_TOKEN: "changeme"
        DOMAIN: "https://vaultwarden.local"
        LOG_LEVEL: "info"
        MAIL_FROM: "noreply@mail.local"
        MAIL_FROM_NAME: "Vaultwarden"
        MAIL_HOST: "stalwart.social.svc.cluster.local"
        MAIL_PORT: "587"
        MAIL_SECURITY: "starttls"
        MAIL_USERNAME: "noreply@mail.local"
        MAIL_PASSWORD: ""

  # Env-style ConfigMap consumed via envFrom: kept verbatim through extraManifests
  # because chart-base's configMaps[] renders every value as a block scalar (which
  # would append trailing newlines to env values).
  extraManifests:
    - |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: vaultwarden-config
        namespace: {{ .Release.Namespace }}
        labels:
          {{- include "chart-base.labels" . | nindent 4 }}
      data:
        # base config
        DOMAIN: https://vaultwarden.local
        PROTOCOL: https
        ROCKET_ADDRESS: "0.0.0.0"
        ROCKET_PORT: "80"
        ROCKET_WORKERS: "10"

        # Web Vault
        WEB_VAULT_ENABLED: "true"
        WEB_VAULT_VERSION: latest

        # Admin
        ADMIN_ENABLED: "true"
        ADMIN_PATH: "/admin"

        # SignUps
        SIGNUPS_ALLOWED: "false"
        INVITATIONS_ORG_NAME: Organization

        # Organizations
        ORGANIZATIONS_ALLOW_NEW: "true"

        # Two Factor
        EMAIL_TWO_FACTOR_ENFORCED: "false"

        # Icons service
        ICON_CACHE_TTL: "2592000"
        ICON_CACHE_NEGTTL: "259200"
        ICON_DOWNLOAD_TIMEOUT: "10"

        # Logging
        LOG_LEVEL: info

        # Security
        IP_HEADER: "X-Forwarded-For"
        DOMAIN_ORIGIN: https://vaultwarden.local
        DOMAIN_PATH: "/"
        SHOW_PASSWORD_HINT: "true"

        # Attachments cleanup
        TRASH_AUTO_DELETE_DAYS: "30"

        # Rate limiting
        LOGIN_RATELIMIT_SECONDS: "60"
        LOGIN_RATELIMIT_MAX_BURST: "10"

  serviceAccount:
    create: true
    automount: true

  rbac:
    create: true
    clusterRules:
      - { apiGroups: [""], resources: [pods], verbs: [get, list] }
      - { apiGroups: [""], resources: [secrets], verbs: [get, list] }

  networkPolicy:
    enabled: true
    allowDB: true

  serviceMonitor:
    enabled: true
    port: metrics
    path: /metrics

  pdb:
    enabled: false

  routing:
    httpRoutes:
      - host: vaultwarden.local
        port: 8080
        authentik:
          enabled: false

  tests:
    enabled: true
    port: 8080
