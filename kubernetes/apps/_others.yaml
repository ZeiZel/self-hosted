apps:
  # =====================================================
  # TIER 0: CORE SERVICES (Always deployed, non-selectable)
  # These services MUST be deployed first and cannot be disabled
  # =====================================================

  namespaces:
    repo: charts
    chart: namespaces
    namespace: default
    version: v1.0.0
    tier: core
    mandatory: true

  traefik:
    repo: traefik
    chart: traefik
    namespace: ingress
    version: v37.2.0
    createNamespace: true
    tier: core
    mandatory: true
    needs:
      - default/namespaces

  consul:
    repo: charts
    chart: consul
    version: "1.0.0"
    namespace: service
    tier: core
    mandatory: true
    needs:
      - ingress/traefik

  vault:
    repo: charts
    chart: vault
    namespace: service
    version: v1.0.0
    tier: core
    mandatory: true
    needs:
      - ingress/traefik

  cert-manager:
    repo: jetstack
    chart: cert-manager
    version: v1.19.1
    namespace: service
    tier: core
    mandatory: true
    needs:
      - service/vault

  pangolin-server:
    repo: charts
    chart: pangolin-server
    namespace: infrastructure
    version: v1.0.0
    tier: core
    mandatory: true
    needs:
      - service/vault
      - service/cert-manager

  pangolin:
    repo: charts
    chart: pangolin
    namespace: infrastructure
    version: v1.0.0
    tier: core
    mandatory: true
    needs:
      - service/vault
      - infrastructure/pangolin-server

  authentik:
    repo: authentik
    chart: authentik
    namespace: service
    version: "2024.12.3"
    tier: core
    mandatory: true
    needs:
      - ingress/traefik
      - db/postgres
      - db/valkey
      - service/vault

  # =====================================================
  # TIER 1: INFRASTRUCTURE SERVICES (Recommended)
  # =====================================================

  openebs:
    repo: openebs
    chart: openebs
    namespace: openebs
    version: "4.3.0"
    tier: infrastructure
    mandatory: true
    needs:
      - default/namespaces

  monitoring:
    repo: charts
    chart: monitoring
    version: v1.0.0
    namespace: service
    tier: infrastructure
    mandatory: true
    needs:
      - ingress/traefik
      - service/vault

  logging:
    repo: charts
    chart: logging
    version: v1.0.0
    namespace: service
    tier: infrastructure
    mandatory: true
    needs:
      - ingress/traefik
      - service/vault
      - service/authentik
      - service/monitoring

  glance:
    repo: charts
    chart: glance
    namespace: infrastructure
    version: v1.0.0
    tier: infrastructure
    mandatory: true
    needs:
      - ingress/traefik
      - service/vault

  # =====================================================
  # TIER 2: DATABASES (User-selectable)
  # postgres and valkey are mandatory (required for authentik)
  # =====================================================

  valkey:
    repo: bitnami
    chart: valkey
    namespace: db
    version: "5.4.3"
    tier: database
    mandatory: true
    needs:
      - ingress/traefik
      - service/vault

  postgres:
    repo: bitnami
    chart: postgresql
    namespace: db
    version: "18.5.1"
    tier: database
    mandatory: true
    needs:
      - ingress/traefik
      - service/vault

  minio:
    repo: bitnami
    chart: minio
    namespace: db
    version: "17.0.21"
    tier: database
    mandatory: false
    needs:
      - ingress/traefik
      - service/vault

  mongodb:
    repo: bitnami
    chart: mongodb
    namespace: db
    version: "18.6.1"
    tier: database
    mandatory: false
    needs:
      - ingress/traefik
      - service/vault

  rabbitmq:
    repo: bitnami
    chart: rabbitmq
    namespace: db
    version: "16.0.14"
    tier: database
    mandatory: false
    needs:
      - ingress/traefik
      - service/vault

  clickhouse:
    repo: bitnami
    chart: clickhouse
    namespace: db
    version: "9.4.4"
    tier: database
    mandatory: false
    needs:
      - ingress/traefik
      - service/vault

  mysql:
    repo: bitnami
    chart: mysql
    namespace: db
    version: "14.0.3"
    tier: database
    mandatory: false
    needs:
      - ingress/traefik
      - service/vault

  supabase:
    repo: charts
    chart: supabase
    namespace: db
    version: "v1.0.0"
    tier: database
    mandatory: false
    needs:
      - db/postgres
      - db/minio
      - db/valkey
      - ingress/traefik
      - service/vault

  # =====================================================
  # TIER 3: APPLICATION SERVICES (User-selectable)
  # All tier 3 services are optional (mandatory: false)
  # =====================================================

  # INFRASTRUCTURE TOOLS
  devtron:
