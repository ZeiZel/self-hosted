apiVersion: v2
name: chart-base
description: >-
  Generic application chart used as a subchart by every self-hosted service. App
  charts keep an EMPTY templates/ dir and a `dependencies: [chart-base]` entry;
  chart-base renders all their resources from values nested under `chart-base:`.
  Supports a `workloads[]` list (Deployment/StatefulSet/DaemonSet/Job/CronJob with
  init containers and volumeClaimTemplates), multiple Services, inline ConfigMaps
  and Secrets, PVCs, namespaced + cluster RBAC with multiple ServiceAccounts,
  NetworkPolicy, ServiceMonitor, PDB, HPA, Gateway-API HTTPRoute / Ingress /
  Traefik routing, a helm test, and an `extraManifests[]` raw escape hatch.
  Security context (runAsNonRoot, readOnlyRootFilesystem, drop ALL, seccomp),
  standard labels and the `prometheus: kube-prometheus` ServiceMonitor label are
  baked in.
type: application
version: 0.1.0
appVersion: "1.0.0"
