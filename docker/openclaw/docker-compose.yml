---
# OpenClaw - Self-hosted AI Assistant
# Reference configuration for development/testing
# Production deployment uses Kubernetes (see kubernetes/charts/openclaw)

services:
  openclaw:
    image: alpine/openclaw:${OPENCLAW_VERSION:-1.0.0}
    container_name: openclaw
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
      - "${OPENCLAW_OAUTH_PORT:-1455}:1455"
    environment:
      # Language settings
      - LANG=C.UTF-8

      # LLM Provider API Keys (required - at least one)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # Gateway authentication
      - GATEWAY_TOKEN=${GATEWAY_TOKEN}

      # Browser automation
      - PLAYWRIGHT_BROWSERS_PATH=/home/node/.cache/ms-playwright

      # Optional: Extra apt packages
      - OPENCLAW_DOCKER_APT_PACKAGES=${OPENCLAW_DOCKER_APT_PACKAGES:-}

      # Optional: Extra host bind mounts
      - OPENCLAW_EXTRA_MOUNTS=${OPENCLAW_EXTRA_MOUNTS:-}
    volumes:
      # Configuration and memory persistence
      - openclaw-config:/home/node/.openclaw

      # Workspace for agent file operations
      - openclaw-workspace:/workspace

      # Browser cache persistence
      - openclaw-cache:/home/node/.cache
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - openclaw-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Optional: Nginx reverse proxy with SSL
  nginx:
    image: nginx:1.27-alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - openclaw
    networks:
      - openclaw-net
    profiles:
      - with-proxy

volumes:
  openclaw-config:
    name: openclaw-config
  openclaw-workspace:
    name: openclaw-workspace
  openclaw-cache:
    name: openclaw-cache

networks:
  openclaw-net:
    name: openclaw-net
