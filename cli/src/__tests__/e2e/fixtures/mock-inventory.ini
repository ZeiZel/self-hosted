# Mock Inventory for E2E Testing
# This inventory uses local connection to avoid requiring real hosts

[all:vars]
ansible_connection=local
ansible_python_interpreter=/usr/bin/python3

[master]
mock-master ansible_host=127.0.0.1 ip=192.168.100.10

[workers]
mock-worker-01 ansible_host=127.0.0.1 ip=192.168.100.11
mock-worker-02 ansible_host=127.0.0.1 ip=192.168.100.12

[gateway]
mock-gateway ansible_host=127.0.0.1 ip=192.168.100.20

[storage]
mock-storage ansible_host=127.0.0.1 ip=192.168.100.30

[backups]
mock-backup ansible_host=127.0.0.1 ip=192.168.100.40

[k8s:children]
master
workers

[infrastructure:children]
gateway
storage
backups
